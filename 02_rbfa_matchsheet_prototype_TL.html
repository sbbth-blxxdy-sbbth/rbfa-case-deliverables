<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>RBFA Digital Match Sheet — Team Responsible (Prototype)</title>
<style>
  /* ============================================================
     RBFA Match Sheet — Team Responsible mobile prototype
     Self-contained, no build step, no network. Material-inspired UI.
     ============================================================ */
  :root{
    --rbfa-red:#E2001A;          /* primary */
    --rbfa-red-dark:#B30015;
    --rbfa-red-08:rgba(226,0,26,.08);
    --rbfa-red-12:rgba(226,0,26,.12);
    --surface:#ffffff;
    --bg:#f1f3f4;               /* Material grey background */
    --on-surface:#1f1f1f;
    --on-surface-var:#5f6368;   /* secondary text */
    --outline:#dadce0;
    --outline-soft:#e8eaed;
    --green:#1e8e3e;
    --green-bg:#e6f4ea;
    --amber:#b06000;
    --amber-bg:#fef7e0;
    --red-bg:#fce8e6;
    --blue:#1a73e8;
    --shadow-1:0 1px 2px rgba(60,64,67,.18),0 1px 3px 1px rgba(60,64,67,.10);
    --shadow-2:0 1px 2px rgba(60,64,67,.18),0 2px 6px 2px rgba(60,64,67,.10);
    --shadow-3:0 4px 8px 3px rgba(60,64,67,.10),0 1px 3px rgba(60,64,67,.18);
    --radius:16px;
    --font:'Roboto','Segoe UI',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:var(--font);
    background:#202124;
    color:var(--on-surface);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;
  }
  /* Phone frame */
  #phone{
    width:412px;max-width:100vw;height:892px;max-height:100vh;
    background:var(--bg);position:relative;overflow:hidden;
    display:flex;flex-direction:column;
    box-shadow:0 0 0 10px #000, 0 24px 60px rgba(0,0,0,.6);
    border-radius:38px;
  }
  @media (max-width:430px){#phone{border-radius:0;box-shadow:none;height:100vh;}}
  .status-bar{
    height:34px;flex:0 0 34px;display:flex;align-items:center;justify-content:space-between;
    padding:0 22px;font-size:13px;font-weight:600;color:#fff;background:var(--rbfa-red);
  }
  .status-bar.light{color:var(--on-surface);background:var(--surface);}
  .status-bar .dots{display:flex;gap:5px;align-items:center;}
  #screen{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}

  /* ---------- App bar ---------- */
  .appbar{
    background:var(--rbfa-red);color:#fff;display:flex;align-items:center;
    gap:8px;padding:0 8px;height:60px;flex:0 0 60px;box-shadow:var(--shadow-1);z-index:5;
  }
  .appbar .title{font-size:20px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .iconbtn{
    width:44px;height:44px;border:none;background:transparent;color:inherit;border-radius:50%;
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 44px;
  }
  .iconbtn:active{background:rgba(255,255,255,.18);}
  .iconbtn.dark:active{background:rgba(0,0,0,.08);}

  .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .pad{padding:16px;}

  /* ---------- Cards ---------- */
  .card{
    background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-1);
    margin-bottom:14px;overflow:hidden;
  }
  .card.clickable{cursor:pointer;transition:box-shadow .15s,transform .05s;}
  .card.clickable:active{transform:scale(.99);box-shadow:var(--shadow-2);}

  .section-title{font-size:13px;font-weight:600;color:var(--on-surface-var);
    text-transform:uppercase;letter-spacing:.06em;margin:18px 4px 8px;}

  /* ---------- Buttons ---------- */
  .btn{
    border:none;border-radius:24px;padding:0 24px;height:48px;font-size:15px;font-weight:600;
    font-family:var(--font);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
    gap:8px;width:100%;transition:transform .05s,box-shadow .15s,background .15s;
  }
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--rbfa-red);color:#fff;box-shadow:var(--shadow-1);}
  .btn-primary:active{background:var(--rbfa-red-dark);}
  .btn-primary:disabled{background:#e0e0e0;color:#9aa0a6;box-shadow:none;cursor:not-allowed;}
  .btn-tonal{background:var(--rbfa-red-12);color:var(--rbfa-red-dark);}
  .btn-text{background:transparent;color:var(--rbfa-red);width:auto;padding:0 12px;height:40px;}
  .btn-text:active{background:var(--rbfa-red-08);}
  .btn-green{background:var(--green);color:#fff;box-shadow:var(--shadow-1);}
  .btn-green:disabled{background:#e0e0e0;color:#9aa0a6;box-shadow:none;cursor:not-allowed;}

  .bottom-bar{
    flex:0 0 auto;background:var(--surface);padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    border-top:1px solid var(--outline-soft);box-shadow:0 -2px 6px rgba(60,64,67,.06);
  }

  /* ---------- Form fields ---------- */
  .field{position:relative;margin-bottom:18px;}
  .field label{display:block;font-size:13px;color:var(--on-surface-var);margin-bottom:6px;font-weight:500;}
  .field input{
    width:100%;height:52px;border:1px solid var(--outline);border-radius:10px;padding:0 14px;
    font-size:16px;font-family:var(--font);background:var(--surface);color:var(--on-surface);outline:none;
  }
  .field input:focus{border-color:var(--rbfa-red);box-shadow:0 0 0 1px var(--rbfa-red);}
  .field.error input{border-color:var(--rbfa-red);box-shadow:0 0 0 1px var(--rbfa-red);}
  .field .hint{font-size:12.5px;margin-top:5px;color:var(--on-surface-var);}
  .field .hint.err{color:var(--rbfa-red);}

  /* ---------- Chips / segmented ---------- */
  .chips{display:flex;gap:8px;overflow-x:auto;padding:2px 0 2px;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto;border:1px solid var(--outline);background:var(--surface);border-radius:10px;
    height:36px;padding:0 14px;font-size:13.5px;font-weight:500;color:var(--on-surface);
    display:inline-flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap;
  }
  .chip.active{background:var(--rbfa-red-12);border-color:transparent;color:var(--rbfa-red-dark);}
  .segmented{display:flex;background:var(--surface);border-bottom:1px solid var(--outline-soft);}
  .segmented button{
    flex:1;height:48px;border:none;background:transparent;font-family:var(--font);font-size:14px;
    font-weight:600;color:var(--on-surface-var);cursor:pointer;position:relative;
  }
  .segmented button.active{color:var(--rbfa-red);}
  .segmented button.active::after{
    content:"";position:absolute;left:12%;right:12%;bottom:0;height:3px;border-radius:3px 3px 0 0;background:var(--rbfa-red);
  }

  /* ---------- Search ---------- */
  .searchbar{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--outline);
    border-radius:26px;height:48px;padding:0 16px;margin-bottom:12px;}
  .searchbar input{border:none;outline:none;flex:1;font-size:15px;font-family:var(--font);background:transparent;}

  /* ---------- Filter row (directly under search, no extra gap) ---------- */
  .filterrow{display:flex;gap:8px;margin:-2px 0 16px;}
  .filter-chip{flex:0 1 auto;max-width:62%;display:inline-flex;align-items:center;gap:4px;
    border:1px solid var(--outline);background:#fff;border-radius:18px;height:36px;padding:0 8px 0 14px;
    font-size:13px;font-weight:500;color:var(--on-surface-var);cursor:pointer;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;}
  .filter-chip span.lbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .filter-chip .x{display:flex;align-items:center;justify-content:center;width:24px;height:24px;flex:0 0 24px;
    border-radius:50%;color:var(--on-surface-var);}
  .filter-chip .x:active{background:#f1f3f4;}
  .filter-chip.active{background:var(--rbfa-red-12);border-color:transparent;color:var(--rbfa-red-dark);}
  .filter-chip svg{flex:0 0 auto;}

  /* ---------- Date picker (calendar grid) ---------- */
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .cal-head .lbl{font-size:16px;font-weight:600;}
  .cal-navbtn{width:36px;height:36px;border-radius:50%;border:none;background:transparent;color:var(--on-surface-var);
    display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .cal-navbtn:active{background:#f1f3f4;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;}
  .cal-dow{font-size:11.5px;font-weight:600;color:var(--on-surface-var);padding:4px 0 8px;}
  .cal-day{position:relative;width:36px;height:36px;margin:2px auto;display:flex;align-items:center;justify-content:center;
    font-size:14px;border:1px solid transparent;background:transparent;font-family:var(--font);color:var(--on-surface);
    cursor:pointer;border-radius:50%;transition:background .1s;flex-shrink:0;}
  .cal-day:disabled{color:#d0d2d4;cursor:default;}
  .cal-day:not(:disabled):not(.selected):active{background:var(--rbfa-red-08);}
  .cal-day.today{color:var(--rbfa-red);border-color:var(--rbfa-red);font-weight:500;}
  .cal-day.selected{background:var(--rbfa-red);color:#fff;font-weight:600;border-color:transparent;}
  .cal-day.has-match::after{content:"";position:absolute;bottom:5px;left:50%;transform:translateX(-50%);
    width:5px;height:5px;border-radius:50%;background:var(--rbfa-red);}
  .cal-day.selected.has-match::after{background:#fff;}

  /* ---------- List rows ---------- */
  .row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#fff;border-bottom:1px solid var(--outline-soft);cursor:pointer;}
  .row:last-child{border-bottom:none;}
  .row.disabled{cursor:not-allowed;background:#fafafa;}
  .num{width:34px;height:34px;flex:0 0 34px;border-radius:50%;background:#f1f3f4;border:1px solid var(--outline);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#3c4043;}
  .row .pname{font-weight:500;font-size:15px;}
  .row .psub{font-size:12.5px;color:var(--on-surface-var);}
  .check{width:24px;height:24px;flex:0 0 24px;border:2px solid var(--outline);border-radius:6px;
    display:flex;align-items:center;justify-content:center;}
  .check.on{background:var(--rbfa-red);border-color:var(--rbfa-red);}
  .badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px;display:inline-flex;align-items:center;gap:4px;}
  .badge.green{background:var(--green-bg);color:var(--green);}
  .badge.amber{background:var(--amber-bg);color:var(--amber);}
  .badge.red{background:var(--red-bg);color:var(--rbfa-red-dark);}
  .badge.grey{background:#f1f3f4;color:var(--on-surface-var);}
  .badge.blue{background:#e8f0fe;color:var(--blue);}

  .pill-toggle{display:flex;border:1px solid var(--outline);border-radius:9px;overflow:hidden;}
  .pill-toggle button{border:none;background:#fff;font-family:var(--font);font-size:12.5px;font-weight:600;
    padding:7px 12px;color:var(--on-surface-var);cursor:pointer;}
  .pill-toggle button.on{background:var(--rbfa-red);color:#fff;}
  .toggle-switch{width:48px;height:26px;flex:0 0 48px;border-radius:13px;background:#bdbdbd;position:relative;
    border:none;cursor:pointer;padding:0;transition:background .15s;box-shadow:inset 0 1px 2px rgba(0,0,0,.15);}
  .toggle-switch.on{background:var(--green);}
  .toggle-switch .thumb{position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:#fff;
    box-shadow:var(--shadow-1);transition:transform .15s;}
  .toggle-switch.on .thumb{transform:translateX(22px);}
  .ywarn{display:inline-block;width:10px;height:14px;background:#ffce00;border:1px solid #e6b800;border-radius:2px;
    margin-left:6px;vertical-align:middle;box-shadow:var(--shadow-1);}

  .capbtn{width:36px;height:36px;border-radius:50%;border:1px solid var(--outline);background:#fff;
    font-weight:800;font-size:14px;color:#bdbdbd;cursor:pointer;}
  .capbtn.on{background:#ffce00;border-color:#e6b800;color:#5b4b00;box-shadow:var(--shadow-1);}

  /* ---------- Banners ---------- */
  .banner{display:flex;gap:10px;padding:12px 14px;border-radius:12px;font-size:13.5px;line-height:1.45;margin-bottom:14px;}
  .banner.info{background:#e8f0fe;color:#174ea6;}
  .banner.warn{background:var(--amber-bg);color:var(--amber);}
  .banner.err{background:var(--red-bg);color:var(--rbfa-red-dark);}
  .banner.ok{background:var(--green-bg);color:var(--green);}
  .banner svg{flex:0 0 20px;margin-top:1px;}

  /* ---------- Match header / VS ---------- */
  .vs{display:flex;align-items:center;justify-content:space-between;text-align:center;}
  .vs .team{flex:1;}
  .crest{width:46px;height:46px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;
    font-weight:800;color:#fff;font-size:15px;}
  .vs .mid{padding:0 8px;color:#9aa0a6;font-weight:700;font-size:13px;}

  /* meta rows */
  .meta{display:flex;gap:10px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--outline-soft);}
  .meta:last-child{border-bottom:none;}
  .meta .mlabel{font-size:12px;color:var(--on-surface-var);}
  .meta .mval{font-size:14.5px;font-weight:500;}

  /* ---------- Step cards on hub ---------- */
  .step{display:flex;align-items:center;gap:14px;padding:16px;}
  .step .ico{width:44px;height:44px;flex:0 0 44px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
  .ico.todo{background:var(--rbfa-red-12);color:var(--rbfa-red);}
  .ico.done{background:var(--green-bg);color:var(--green);}
  .step .stitle{font-weight:600;font-size:15.5px;}
  .step .ssub{font-size:13px;color:var(--on-surface-var);margin-top:2px;}

  /* ---------- FAB ---------- */
  .fab{position:absolute;right:18px;bottom:22px;height:56px;border-radius:18px;background:var(--rbfa-red);
    color:#fff;border:none;padding:0 20px;font-family:var(--font);font-weight:600;font-size:15px;
    display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-3);cursor:pointer;z-index:6;}
  .fab:active{background:var(--rbfa-red-dark);}

  /* ---------- Snackbar ---------- */
  #snackbar{position:absolute;left:14px;right:14px;bottom:18px;background:#323232;color:#fff;
    border-radius:10px;padding:14px 16px;font-size:14px;box-shadow:var(--shadow-3);z-index:40;
    transform:translateY(140%);transition:transform .25s;display:flex;align-items:center;gap:12px;}
  #snackbar.show{transform:translateY(0);}
  #snackbar .sb-action{color:#ff9a9a;font-weight:700;margin-left:auto;cursor:pointer;white-space:nowrap;}

  /* ---------- Modal / sheet ---------- */
  .overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:30;display:flex;align-items:flex-end;
    animation:fade .2s;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{background:#fff;width:100%;border-radius:24px 24px 0 0;padding:20px 18px calc(18px + env(safe-area-inset-bottom));
    animation:slideup .25s;max-height:88%;overflow-y:auto;}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sheet .grip{width:40px;height:4px;border-radius:4px;background:var(--outline);margin:0 auto 16px;}
  .sheet h3{margin:0 0 6px;font-size:19px;}
  .menu-item{display:flex;align-items:center;gap:14px;padding:14px 6px;font-size:15px;cursor:pointer;border-radius:10px;}
  .menu-item:active{background:#f1f3f4;}

  /* misc */
  .empty{text-align:center;color:var(--on-surface-var);padding:48px 24px;}
  .empty svg{opacity:.4;margin-bottom:12px;}
  .divider{height:1px;background:var(--outline-soft);margin:0 16px;}
  .req{display:flex;align-items:center;gap:8px;font-size:13px;margin:5px 0;color:var(--on-surface-var);}
  .req.met{color:var(--green);}
  .center-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px 28px;}
  .demo-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.18);color:#fff;
    border:none;font-family:var(--font);font-size:12px;font-weight:600;padding:5px 10px;border-radius:20px;cursor:pointer;}
  a.link{color:var(--rbfa-red);font-weight:600;text-decoration:none;cursor:pointer;}
</style>
</head>

const $ = (id)=>document.getElementById(id);
function fmtTime(min){const h=Math.floor(min/60),m=min%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');}
function activeMatch(){return MATCHES.find(m=>m.id===state.activeMatchId);}
function squadIds(){return Object.keys(state.squad).map(Number);}
function starters(){return squadIds().filter(id=>state.squad[id].role==='starter');}
function subs(){return squadIds().filter(id=>state.squad[id].role==='sub');}
function captainId(){return squadIds().find(id=>state.squad[id].captain);}
function delegatePresent(){return state.delegateId!=null && state.officials.includes(state.delegateId);}
function squadComplete(){return starters().length===RULES.starters && captainId()!=null;}
function officialsComplete(){return delegatePresent();}
function canSubmit(){return squadComplete() && officialsComplete();}
function isLate(){const m=activeMatch();return (m.kickoffMin - state.nowMin) < 20;}
function P(id){return PLAYERS.find(p=>p.id===id);}
function posSub(p){return p.pos==='Goalkeeper' ? '<div class="psub">'+p.pos+'</div>' : '';}

let snackTimer=null;
function snack(msg, actionLabel, actionFn){
  const sb=$('snackbar');
  sb.innerHTML = '<span>'+msg+'</span>' + (actionLabel?'<span class="sb-action" id="sbAction">'+actionLabel+'</span>':'');
  sb.classList.add('show');
  if(actionLabel){$('sbAction').onclick=()=>{sb.classList.remove('show');actionFn&&actionFn();};}
  clearTimeout(snackTimer);
  snackTimer=setTimeout(()=>sb.classList.remove('show'), actionLabel?5000:2600);
}

function go(screen){ state.screen=screen; render(); $('screen').scrollTop=0; }

/* ============================================================
   RENDER ROOT
   ============================================================ */
function render(){
  $('clock').textContent = fmtTime(state.nowMin);
  const sb=$('statusbar');
  const light = ['login','forgot','forgotSent','reset','resetDone','success'].includes(state.screen);
  sb.className = 'status-bar'+(light?' light':'');
  let html='';
  switch(state.screen){
    case 'login':      html=ScLogin(); break;
    case 'forgot':     html=ScForgot(); break;
    case 'forgotSent': html=ScForgotSent(); break;
    case 'reset':      html=ScReset(); break;
    case 'resetDone':  html=ScResetDone(); break;
    case 'dashboard':  html=ScDashboard(); break;
    case 'sheet':      html=ScSheet(); break;
    case 'squad':      html=ScSquad(); break;
    case 'officials':  html=ScOfficials(); break;
    case 'review':     html=ScReview(); break;
    case 'success':    html=ScSuccess(); break;
  }
  const scr=$('screen');
  const prevScrollEl = scr.querySelector('.scroll');
  const prevScroll = prevScrollEl ? prevScrollEl.scrollTop : 0;
  scr.innerHTML = html;
  const nextScrollEl = scr.querySelector('.scroll');
  if(nextScrollEl) nextScrollEl.scrollTop = prevScroll;
  if(state.screen==='reset') wireReset();
}

// US-AA-06 set new password + US-AA-07 inline requirements
function ScReset(){
  return `
  <div class="appbar"><button class="iconbtn" onclick="go('login')">${I.back}</button><span class="title">New password</span></div>
  <div class="scroll pad" style="background:#fff;">
    <div class="field"><label>New password</label><input id="np" type="password" placeholder="Password"/></div>
    <div id="reqList" style="margin:-4px 4px 14px;">
      <div class="req" data-k="len">${reqDot(false)}At least 8 characters</div>
      <div class="req" data-k="up">${reqDot(false)}At least 1 uppercase letter</div>
      <div class="req" data-k="num">${reqDot(false)}At least 1 number</div>
      <div class="req" data-k="spec">${reqDot(false)}At least 1 special character</div>
    </div>
    <div class="field"><label>Confirm password</label><input id="np2" type="password" placeholder="Repeat password"/>
      <div class="hint err" id="matchHint" style="display:none;">The passwords do not match.</div></div>
    <button class="btn btn-primary" id="savePw" disabled onclick="savePw()">Save password</button>
  </div>`;
}
function reqDot(met){return met
  ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="#1e8e3e"><path d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z"/></svg>'
  : '<svg width="16" height="16" viewBox="0 0 24 24" fill="#bdbdbd"><circle cx="12" cy="12" r="5"/></svg>';}
function pwChecks(v){return{len:v.length>=8,up:/[A-Z]/.test(v),num:/[0-9]/.test(v),spec:/[^A-Za-z0-9]/.test(v)};}
function wireReset(){
  const np=$('np'), np2=$('np2');
  function upd(){
    const c=pwChecks(np.value); const all=Object.values(c).every(Boolean);
    document.querySelectorAll('#reqList .req').forEach(el=>{
      const met=c[el.dataset.k]; el.classList.toggle('met',met);
      el.querySelector('svg').outerHTML=reqDot(met);
    });
    const match = np2.value.length>0 && np.value===np2.value;
    $('matchHint').style.display = (np2.value.length>0 && !match)?'block':'none';
    $('savePw').disabled = !(all && match);
  }
  np.oninput=upd; np2.oninput=upd;
}
function savePw(){ go('resetDone'); }
function ScResetDone(){
  return `
  <div class="center-col" style="background:#fff;">

        ${I.cal.replace('#5f6368','currentColor')}<span class="lbl">${state.dashDateFilter?fmtDateShort(state.dashDateFilter):'Date'}</span>
        ${state.dashDateFilter?`<span class="x" onclick="event.stopPropagation();clearDateFilter()">${I.close.replace('width="20" height="20"','width="14" height="14"')}</span>`:I.caret}
      </span>

        ${I.cup.replace('#5f6368','currentColor')}<span class="lbl">${compFilterLabel()}</span>
        ${state.dashCompFilters.length?`<span class="x" onclick="event.stopPropagation();clearCompFilter()">${I.close.replace('width="20" height="20"','width="14" height="14"')}</span>`:I.caret}
      </span>
    </div>
    <div id="matchList">${MatchList(state.dashTab==='next'?next:prev, state.dashTab)}</div>
  </div>`;

function fmtDateShort(iso){
  const d=new Date(iso+'T00:00:00');
  return d.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
}
function MatchList(list, tab){
  // apply search + filters
  let r=list.filter(m=>{
    const s=state.dashSearch.toLowerCase().trim();
    const matchS = !s || m.away.toLowerCase().includes(s) || m.home.toLowerCase().includes(s)
       || m.venue.toLowerCase().includes(s);
    const matchDate = !state.dashDateFilter || m.date===state.dashDateFilter;
    const matchComp = !state.dashCompFilters.length || state.dashCompFilters.includes(m.competition);
    return matchS && matchDate && matchComp;
  });
  if(r.length===0){
    return `<div class="empty">${I.search}<p>No matches found.<br/>Adjust your search term or filters.</p></div>`;
  }
  // soonest first for upcoming, most recent first for previous
  r=r.slice().sort((a,b)=> tab==='next' ? a.date.localeCompare(b.date) : b.date.localeCompare(a.date));
  const hero=r[0], rest=r.slice(1);
  let html = `<div class="section-title" style="margin-top:2px;">${tab==='next'?'Next match':'Most recent match'}</div>` + MatchCard(hero);
  if(rest.length){
    html += `<div class="section-title">${tab==='next'?'Also coming up':'Earlier matches'}</div>`;
    html += `<div class="card">${rest.map(m=>CompactMatchRow(m)).join('')}</div>`;
  }
  return html;
}

function MatchCard(m){

function onDashSearch(v){state.dashSearch=v; $('matchList').innerHTML=MatchList(state.dashTab==='next'?MATCHES.filter(m=>m.status!=='submitted'):MATCHES.filter(m=>m.status==='submitted'), state.dashTab);}

/* ---------- Date filter (calendar picker) ---------- */
const TODAY_ISO='2026-06-26';
function openDateFilterSheet(){
  state.calMonth = TODAY_ISO.slice(0,7);
  const ov=document.createElement('div'); ov.className='overlay'; ov.onclick=e=>{if(e.target===ov)ov.remove();};
  ov.innerHTML=`<div class="sheet" id="dateSheet"><div class="grip"></div>${DatePickerSheetBody()}</div>`;
  $('phone').appendChild(ov);
}
function DatePickerSheetBody(){
  const [y,mo]=state.calMonth.split('-').map(Number);
  const first=new Date(y,mo-1,1);
  const startDow=(first.getDay()+6)%7; // Monday-first grid
  const daysInMonth=new Date(y,mo,0).getDate();
  const monthLabel=first.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const todayIso=TODAY_ISO;
  const tabMatches = state.dashTab==='next' ? MATCHES.filter(m=>m.status!=='submitted') : MATCHES.filter(m=>m.status==='submitted');
  const matchDates=new Set(tabMatches.map(m=>m.date));
  let cells='';
  for(let i=0;i<startDow;i++) cells+=`<span></span>`;
  for(let d=1;d<=daysInMonth;d++){
    const iso=`${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls=['cal-day'];
    if(iso===todayIso) cls.push('today');
    if(iso===state.dashDateFilter) cls.push('selected');
    if(matchDates.has(iso)) cls.push('has-match');
    cells+=`<button class="${cls.join(' ')}" onclick="selectFilterDate('${iso}')">${d}</button>`;
  }
  return `
    <h3>Filter by date</h3>
    <p style="color:var(--on-surface-var);font-size:13px;margin:0 0 16px;">Pick a match day. Days with a ${state.dashTab==='next'?'scheduled':'previous'} match are marked with a dot.</p>
    <div class="cal-head">
      <button class="cal-navbtn" onclick="navCalMonth(-1)">${I.chevL}</button>
      <span class="lbl">${monthLabel}</span>
      <button class="cal-navbtn" onclick="navCalMonth(1)">${I.chevR}</button>
    </div>
    <div class="cal-grid">
      <span class="cal-dow">Mo</span><span class="cal-dow">Tu</span><span class="cal-dow">We</span>
      <span class="cal-dow">Th</span><span class="cal-dow">Fr</span><span class="cal-dow">Sa</span><span class="cal-dow">Su</span>
      ${cells}
    </div>
    ${state.dashDateFilter?`<button class="btn btn-text" style="width:100%;margin-top:14px;" onclick="clearDateFilter();this.closest('.overlay').remove()">Clear date filter</button>`:''}
  `;
}
function navCalMonth(delta){
  let [y,mo]=state.calMonth.split('-').map(Number);
  mo+=delta;
  if(mo<1){mo=12;y--;} if(mo>12){mo=1;y++;}
  state.calMonth=`${y}-${String(mo).padStart(2,'0')}`;
  $('dateSheet').innerHTML=`<div class="grip"></div>${DatePickerSheetBody()}`;
}
function selectFilterDate(iso){
  state.dashDateFilter = (state.dashDateFilter===iso) ? null : iso;
  document.querySelector('.overlay')?.remove();
  render();
}
function clearDateFilter(){ state.dashDateFilter=null; document.querySelector('.overlay')?.remove(); render(); }

function togglePlayer(id){

}
function copyPreviousMatch(){
  const eligible=PREV_MATCH_SQUAD.filter(id=>P(id).eligible);
  const skipped=PREV_MATCH_SQUAD.filter(id=>!P(id).eligible).map(id=>P(id).name);
  state.squad={};
  eligible.forEach((id,i)=>{ state.squad[id]={role:i<RULES.starters?'starter':'sub', captain:false}; });
  if(eligible.length) state.squad[eligible[0]].captain=true;
  render();
  snack('Squad copied from previous match.'+(skipped.length?' Not eligible, skipped: '+skipped.join(', ')+'.':''));
}
function SquadLineupTab(){
  if(squadIds().length===0) return `<div class="empty">${I.players}<p>Add players first in "Add players".</p></div>`;
  const st=starters().map(P).sort((a,b)=>a.nr-b.nr), su=subs().map(P).sort((a,b)=>a.nr-b.nr);
  const cap=captainId();
  const row=(p,isStarter)=>`
    <div class="row" style="cursor:default;">
      <div class="num">${p.nr}</div>
      <div style="flex:1;"><div class="pname">${p.name}${cap===p.id?' <span class="badge amber" style="margin-left:4px;">C</span>':''}${p.warn?'<span class="ywarn" title="'+p.warn+'"></span>':''}</div>
        ${posSub(p)}</div>
      ${isStarter?`<button class="capbtn ${cap===p.id?'on':''}" title="Captain" onclick="setCaptain(${p.id})">C</button>`:''}
      <button class="toggle-switch ${isStarter?'on':''}" style="margin-left:10px;" title="${isStarter?'Move to bench':'Move to starting lineup'}" onclick="toggleStartingViaSwitch(${p.id})"><span class="thumb"></span></button>
    </div>`;
  return `
  <div class="pad" style="padding-bottom:4px;"><div class="banner info" style="margin:0;">${I.info}<div>Select your <b>11 starting players</b> and assign one <b>captain</b> (C). The rest stays on the bench.</div></div></div>
  <div class="section-title" style="margin-left:16px;">Starting lineup · ${st.length}/11</div>
  <div>${st.length?st.map(p=>row(p,true)).join(''):'<div style="padding:12px 16px;color:var(--on-surface-var);font-size:13px;">No starting players yet — set players to "Starter".</div>'}</div>
  <div class="section-title" style="margin-left:16px;">Substitutes · ${su.length}</div>
  <div>${su.length?su.map(p=>row(p,false)).join(''):'<div style="padding:12px 16px;color:var(--on-surface-var);font-size:13px;">No substitutes.</div>'}</div>
  <div style="height:8px"></div>`;
}
function setRole(id,role){
  if(role==='starter' && state.squad[id].role!=='starter' && starters().length>=RULES.starters){
    snack('You already have 11 starting players. Move someone to the bench first.'); return;     // US-PT-03 block >11
  }
  state.squad[id].role=role;
  if(role==='sub' && state.squad[id].captain){
    state.squad[id].captain=false;                                                // captain must be a starter
    snack(P(id).name+' has been moved to the bench. Assign a new captain.','Go to lineup',()=>{state.squadTab='lineup';render();});
  }
  render();
}
function toggleStartingViaSwitch(id){
  setRole(id, state.squad[id].role==='starter' ? 'sub' : 'starter');
}
function setCaptain(id){
  squadIds().forEach(p=>state.squad[p].captain=false);                              // US-PT-06 single captain
  state.squad[id].captain=true; render();
  snack(P(id).name+' has been assigned as captain.');
}

/* ---------- Officials (US-PT-07/08) ---------- */
function ScOfficials(){
  const delOk=delegatePresent();
  return `
  <div class="appbar"><button class="iconbtn" onclick="go('sheet')">${I.back}</button><span class="title">Team officials</span>
    <span style="padding-right:14px;font-size:14px;font-weight:600;">${state.officials.length}/${RULES.maxOfficials}</span></div>
  <div class="pad" style="padding-bottom:0;">
    <div class="banner ${delOk?'ok':'warn'}" >${delOk?I.check:I.warn}<div>A <b>team delegate</b> is required on the match sheet. Select an official, then mark them as delegate (D). ${delOk?'Requirement met.':'Not yet assigned.'}</div></div>
  </div>
  <div class="scroll">
    ${OFFICIALS.map(o=>{
      const on=state.officials.includes(o.id);
      const full=!on && state.officials.length>=RULES.maxOfficials;
      const isDel=state.delegateId===o.id;
      return `<div class="row" onclick="${full?`snack('Maximum ${RULES.maxOfficials} officials.')`:`toggleOfficial('${o.id}')`}">
        <div class="check ${on?'on':''}">${on?I.check:''}</div>
        <div style="flex:1;"><div class="pname">${o.name}${isDel?' <span class="badge amber" style="margin-left:4px;">Delegate</span>':''}</div>
          <div class="psub">${o.role}</div></div>
        ${on?`<button class="capbtn ${isDel?'on':''}" title="Team delegate" onclick="event.stopPropagation();setDelegate('${o.id}')">D</button>`:''}
      </div>`;
    }).join('')}
    <div style="height:12px"></div>
  </div>
  <div class="bottom-bar"><button class="btn btn-primary" onclick="go('sheet')">Save</button></div>`;
}
function toggleOfficial(id){
  if(state.officials.includes(id)){
    state.officials=state.officials.filter(x=>x!==id);                              // US-PT-08
    if(state.delegateId===id){
      state.delegateId=null; render();
      snack('Official removed. Assign a new team delegate.'); return;
    }
    render(); return;
  }
  state.officials.push(id); render();                                               // US-PT-07
}
function setDelegate(id){
  state.delegateId=id; render();                                                    // delegate is a role, assignable to any selected official
  snack(OFFICIALS.find(o=>o.id===id).name+' has been assigned as team delegate.');
}

/* ---------- Review & submit (US-PT-09/10/11) ---------- */
function ScReview(){
  const m=activeMatch();
  const missing=[];
  if(starters().length!==RULES.starters) missing.push('Exactly 11 starting players ('+starters().length+' selected)');
  if(captainId()==null) missing.push('Assign a captain');
  if(!delegatePresent()) missing.push('Add a team delegate');
  const ok=missing.length===0;
  const cap=captainId()?P(captainId()):null;
  const st=starters().map(P).sort((a,b)=>a.nr-b.nr), su=subs().map(P).sort((a,b)=>a.nr-b.nr);
  const offs=state.officials.map(id=>OFFICIALS.find(o=>o.id===id));
  const late=isLate();
  return `
  <div class="appbar"><button class="iconbtn" onclick="go('sheet')">${I.back}</button><span class="title">Review & submit</span></div>
  <div class="scroll pad">
    ${!ok?`<div class="banner err">${I.warn}<div><b>Not yet complete.</b> Complete the following before you can submit:<ul style="margin:6px 0 0 18px;padding:0;">${missing.map(x=>'<li>'+x+'</li>').join('')}</ul></div></div>`
          :`<div class="banner ok">${I.check}<div>The match sheet is complete and ready to submit to the referee.</div></div>`}

    ${late?`<div class="banner warn">${I.clock.replace('width="14" height="14"','width="20" height="20"')}<div><b>Late submission.</b> It is ${fmtTime(state.nowMin)} — less than 20 minutes before kickoff (${m.kickoff}). You can still submit, but this will be flagged as late for the referee.</div></div>`:''}

    <div class="card"><div class="pad">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <b>Match</b></div>
      <div style="font-size:13.5px;color:var(--on-surface-var);margin-top:6px;line-height:1.6;">
        ${m.competition} · ${m.round}<br/>${m.home} — ${m.away}<br/>${m.dateLabel} · ${m.kickoff} · ${m.venue}</div>
    </div></div>

    <div class="card"><div class="pad">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <b>Starting lineup (${st.length})</b><a class="link" onclick="go('squad')">${I.edit} Edit</a></div>
      ${st.length?st.map(p=>`<div style="display:flex;gap:10px;align-items:center;padding:5px 0;font-size:14px;"><span class="num" style="width:28px;height:28px;flex:0 0 28px;font-size:12px;">${p.nr}</span>${p.name}${captainId()===p.id?' <span class="badge amber" style="margin-left:auto;">Captain</span>':''}</div>`).join(''):'<div style="color:var(--on-surface-var);font-size:13px;">No starting players.</div>'}
    </div></div>

    <div class="card"><div class="pad">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <b>Substitutes (${su.length})</b><a class="link" onclick="go('squad')">${I.edit} Edit</a></div>
      ${su.length?su.map(p=>`<div style="display:flex;gap:10px;align-items:center;padding:5px 0;font-size:14px;"><span class="num" style="width:28px;height:28px;flex:0 0 28px;font-size:12px;">${p.nr}</span>${p.name}</div>`).join(''):'<div style="color:var(--on-surface-var);font-size:13px;">No substitutes.</div>'}
    </div></div>

    <div class="card"><div class="pad">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <b>Team officials (${offs.length})</b><a class="link" onclick="go('officials')">${I.edit} Edit</a></div>
      ${offs.length?offs.map(o=>`<div style="display:flex;align-items:center;padding:5px 0;font-size:14px;">${o.name} — <span style="color:var(--on-surface-var)">${o.role}</span>${state.delegateId===o.id?' <span class="badge amber" style="margin-left:auto;">Delegate</span>':''}</div>`).join(''):'<div style="color:var(--on-surface-var);font-size:13px;">No officials.</div>'}
    </div></div>
    <div style="height:8px"></div>
  </div>
  <div class="bottom-bar">
    <button class="btn btn-primary" ${ok?'':'disabled'} onclick="confirmSubmit()">${I.send} Submit to referee</button>
  </div>`;
}
function confirmSubmit(){
  const m=activeMatch(), late=isLate();
  const ov=document.createElement('div'); ov.className='overlay'; ov.onclick=e=>{if(e.target===ov)ov.remove();};
  ov.innerHTML=`<div class="sheet"><div class="grip"></div>
    <h3>Submit for good?</h3>
    <p style="color:var(--on-surface-var);line-height:1.5;margin:0 0 16px;">Once submitted, you can <b>no longer change</b> the match sheet. It will be sent to the referee.</p>
    ${late?`<div class="banner warn" style="margin-bottom:14px;">${I.warn}<div>This is a <b>late</b> submission (less than 20 min before kickoff).</div></div>`:`<div class="banner ok" style="margin-bottom:14px;">${I.check}<div>Submitted on time (more than 20 min before kickoff).</div></div>`}
    <button class="btn btn-primary" onclick="finalizeSubmit()">${late?'Submit anyway':'Submit'}</button>
    <div style="height:8px"></div>
    <button class="btn btn-text" style="width:100%" onclick="this.closest('.overlay').remove()">Cancel</button>
  </div>`;
  $('phone').appendChild(ov);
}
function finalizeSubmit(){
  document.querySelector('.overlay')?.remove();
  state.sheetStatus='PENDING_REVIEW'; state.late=isLate();
  state.submittedAt = activeMatch().dateLabel.replace('Today','Today')+', '+fmtTime(state.nowMin);
  go('success');
}

// US-PT-11 confirmation with timestamp
function ScSuccess(){
  return `
  <div class="center-col" style="background:#fff;">
    <div style="width:84px;height:84px;border-radius:50%;background:var(--green-bg);display:flex;align-items:center;justify-content:center;margin-bottom:20px;">
      <svg width="46" height="46" viewBox="0 0 24 24" fill="#1e8e3e"><path d="M9 16.2 4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4z"/></svg></div>
    <h1 style="margin:0 0 8px;font-size:24px;">Match sheet submitted</h1>
    <p style="color:var(--on-surface-var);line-height:1.55;margin:0 0 8px;">The referee has received your match sheet and can now validate the teams.</p>
    <div class="card" style="width:100%;margin-top:14px;"><div class="pad" style="text-align:left;">
      <div class="meta">${I.clock.replace('fill="currentColor"','fill="#5f6368"')}<div><div class="mlabel">Submitted on</div><div class="mval">${state.submittedAt}</div></div></div>
      <div class="meta">${I.whistle}<div><div class="mlabel">Status</div><div class="mval">${sheetBadge(state.sheetStatus)}</div></div></div>
      ${state.late?`<div class="meta">${I.warn.replace('width="20" height="20"','width="16" height="16"').replace('fill="currentColor"','fill="#b06000"')}<div><div class="mlabel">Timeliness</div><div class="mval"><span class="badge amber">Late (&lt; 20 min before kickoff)</span></div></div></div>`:`<div class="meta">${I.check.replace('width="16" height="16"','width="16" height="16"').replace('fill="#fff"','fill="#1e8e3e"')}<div><div class="mlabel">Timeliness</div><div class="mval"><span class="badge green">Submitted on time</span></div></div></div>`}
    </div></div>
    <div style="height:20px"></div>
    <button class="btn btn-primary" onclick="go('sheet')">View match sheet</button>
    <div style="height:8px"></div>
    <button class="btn btn-text" style="width:100%" onclick="go('dashboard')">Back to my matches</button>
  </div>`;
}
function ReadOnlySummary(){
  const st=starters().map(P).sort((a,b)=>a.nr-b.nr), su=subs().map(P).sort((a,b)=>a.nr-b.nr);
  const offs=state.officials.map(id=>OFFICIALS.find(o=>o.id===id));
  const block=(title,items)=>`<div class="card"><div class="pad"><b>${title}</b>${items}</div></div>`;
  return `
    ${block('Starting lineup ('+st.length+')', st.map(p=>`<div style="display:flex;gap:10px;align-items:center;padding:5px 0;font-size:14px;"><span class="num" style="width:28px;height:28px;flex:0 0 28px;font-size:12px;">${p.nr}</span>${p.name}${captainId()===p.id?' <span class="badge amber" style="margin-left:auto;">Captain</span>':''}</div>`).join(''))}
    ${block('Substitutes ('+su.length+')', su.map(p=>`<div style="display:flex;gap:10px;align-items:center;padding:5px 0;font-size:14px;"><span class="num" style="width:28px;height:28px;flex:0 0 28px;font-size:12px;">${p.nr}</span>${p.name}</div>`).join(''))}
    ${block('Team officials ('+offs.length+')', offs.map(o=>`<div style="display:flex;align-items:center;padding:5px 0;font-size:14px;">${o.name} — <span style="color:var(--on-surface-var)">${o.role}</span>${state.delegateId===o.id?' <span class="badge amber" style="margin-left:auto;">Delegate</span>':''}</div>`).join(''))}
  `;
}

/* boot */
render();
</script>
</body>
</html>
