<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>RBFA Digital Match Sheet — Referee (Prototype)</title>
<style>
  /* ============================================================
     RBFA Match Sheet — Referee mobile prototype
     Self-contained, no build step, no network. Material-inspired UI.
     Shares the design language of the Team Responsible prototype
     (rbfa_wedstrijdblad_prototype.html); REF-specific components are
     added at the end of this stylesheet.
     ============================================================ */
  :root{
    --rbfa-red:#E2001A;          /* primary */
    --rbfa-red-dark:#B30015;
    --rbfa-red-08:rgba(226,0,26,.08);
    --rbfa-red-12:rgba(226,0,26,.12);
    --surface:#ffffff;
    --bg:#f1f3f4;               /* Material grey background */
    --on-surface:#1f1f1f;
    --on-surface-var:#5f6368;   /* secondary text */
    --outline:#dadce0;
    --outline-soft:#e8eaed;
    --green:#1e8e3e;
    --green-bg:#e6f4ea;
    --amber:#b06000;
    --amber-bg:#fef7e0;
    --red-bg:#fce8e6;
    --blue:#1a73e8;
    --shadow-1:0 1px 2px rgba(60,64,67,.18),0 1px 3px 1px rgba(60,64,67,.10);
    --shadow-2:0 1px 2px rgba(60,64,67,.18),0 2px 6px 2px rgba(60,64,67,.10);
    --shadow-3:0 4px 8px 3px rgba(60,64,67,.10),0 1px 3px rgba(60,64,67,.18);
    --radius:16px;
    --font:'Roboto','Segoe UI',system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:var(--font);
    background:#202124;
    color:var(--on-surface);
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;
  }
  /* Phone frame */
  #phone{
    width:412px;max-width:100vw;height:892px;max-height:100vh;
    background:var(--bg);position:relative;overflow:hidden;
    display:flex;flex-direction:column;
    box-shadow:0 0 0 10px #000, 0 24px 60px rgba(0,0,0,.6);
    border-radius:38px;
  }
  @media (max-width:430px){#phone{border-radius:0;box-shadow:none;height:100vh;}}
  .status-bar{
    height:34px;flex:0 0 34px;display:flex;align-items:center;justify-content:space-between;
    padding:0 22px;font-size:13px;font-weight:600;color:#fff;background:var(--rbfa-red);
  }
  .status-bar.light{color:var(--on-surface);background:var(--surface);}
  .status-bar .dots{display:flex;gap:5px;align-items:center;}
  #screen{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}

  /* ---------- App bar ---------- */
  .appbar{
    background:var(--rbfa-red);color:#fff;display:flex;align-items:center;
    gap:8px;padding:0 8px;height:60px;flex:0 0 60px;box-shadow:var(--shadow-1);z-index:5;
  }
  .appbar .title{font-size:20px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .iconbtn{
    width:44px;height:44px;border:none;background:transparent;color:inherit;border-radius:50%;
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex:0 0 44px;
  }
  .iconbtn:active{background:rgba(255,255,255,.18);}
  .iconbtn.dark:active{background:rgba(0,0,0,.08);}

  .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
  .pad{padding:16px;}

  /* ---------- Cards ---------- */
  .card{
    background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-1);
    margin-bottom:14px;overflow:hidden;
  }
  .card.clickable{cursor:pointer;transition:box-shadow .15s,transform .05s;}
  .card.clickable:active{transform:scale(.99);box-shadow:var(--shadow-2);}

  .section-title{font-size:13px;font-weight:600;color:var(--on-surface-var);
    text-transform:uppercase;letter-spacing:.06em;margin:18px 4px 8px;}

  /* ---------- Buttons ---------- */
  .btn{
    border:none;border-radius:24px;padding:0 24px;height:48px;font-size:15px;font-weight:600;
    font-family:var(--font);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;
    gap:8px;width:100%;transition:transform .05s,box-shadow .15s,background .15s;
  }
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--rbfa-red);color:#fff;box-shadow:var(--shadow-1);}
  .btn-primary:active{background:var(--rbfa-red-dark);}
  .btn-primary:disabled{background:#e0e0e0;color:#9aa0a6;box-shadow:none;cursor:not-allowed;}
  .btn-tonal{background:var(--rbfa-red-12);color:var(--rbfa-red-dark);}
  .btn-text{background:transparent;color:var(--rbfa-red);width:auto;padding:0 12px;height:40px;}
  .btn-text:active{background:var(--rbfa-red-08);}
  .btn-green{background:var(--green);color:#fff;box-shadow:var(--shadow-1);}
  .btn-green:active{background:#15732f;}
  .btn-green:disabled{background:#e0e0e0;color:#9aa0a6;box-shadow:none;cursor:not-allowed;}
  .btn-dark{background:#3c4043;color:#fff;}
  .btn-dark:active{background:#26282b;}
  .btn-outline{background:#fff;color:var(--on-surface);border:1px solid var(--outline);}

  .bottom-bar{
    flex:0 0 auto;background:var(--surface);padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    border-top:1px solid var(--outline-soft);box-shadow:0 -2px 6px rgba(60,64,67,.06);
  }

  /* ---------- Form fields ---------- */
  .field{position:relative;margin-bottom:18px;}
  .field label{display:block;font-size:13px;color:var(--on-surface-var);margin-bottom:6px;font-weight:500;}
  .field input,.field textarea{
    width:100%;border:1px solid var(--outline);border-radius:10px;padding:0 14px;
    font-size:16px;font-family:var(--font);background:var(--surface);color:var(--on-surface);outline:none;
  }
  .field input{height:52px;}
  .field textarea{padding:12px 14px;min-height:88px;resize:vertical;line-height:1.5;}
  .field input:focus,.field textarea:focus{border-color:var(--rbfa-red);box-shadow:0 0 0 1px var(--rbfa-red);}
  .field.error input{border-color:var(--rbfa-red);box-shadow:0 0 0 1px var(--rbfa-red);}
  .field .hint{font-size:12.5px;margin-top:5px;color:var(--on-surface-var);}
  .field .hint.err{color:var(--rbfa-red);}

  /* ---------- Chips / segmented ---------- */
  .segmented{display:flex;background:var(--surface);border-bottom:1px solid var(--outline-soft);}
  .segmented button{
    flex:1;height:48px;border:none;background:transparent;font-family:var(--font);font-size:14px;
    font-weight:600;color:var(--on-surface-var);cursor:pointer;position:relative;
  }
  .segmented button.active{color:var(--rbfa-red);}
  .segmented button.active::after{
    content:"";position:absolute;left:12%;right:12%;bottom:0;height:3px;border-radius:3px 3px 0 0;background:var(--rbfa-red);
  }

  /* ---------- Search ---------- */
  .searchbar{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--outline);
    border-radius:26px;height:48px;padding:0 16px;margin-bottom:12px;}
  .searchbar input{border:none;outline:none;flex:1;font-size:15px;font-family:var(--font);background:transparent;}

  /* ---------- Filter row (directly under search, no extra gap) ---------- */
  .filterrow{display:flex;gap:8px;margin:-2px 0 16px;}
  .filter-chip{flex:0 1 auto;max-width:62%;display:inline-flex;align-items:center;gap:4px;
    border:1px solid var(--outline);background:#fff;border-radius:18px;height:36px;padding:0 8px 0 14px;
    font-size:13px;font-weight:500;color:var(--on-surface-var);cursor:pointer;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis;}
  .filter-chip span.lbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .filter-chip .x{display:flex;align-items:center;justify-content:center;width:24px;height:24px;flex:0 0 24px;
    border-radius:50%;color:var(--on-surface-var);}
  .filter-chip .x:active{background:#f1f3f4;}
  .filter-chip.active{background:var(--rbfa-red-12);border-color:transparent;color:var(--rbfa-red-dark);}
  .filter-chip svg{flex:0 0 auto;}

  /* ---------- Date picker (calendar grid) ---------- */
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .cal-head .lbl{font-size:16px;font-weight:600;}
  .cal-navbtn{width:36px;height:36px;border-radius:50%;border:none;background:transparent;color:var(--on-surface-var);
    display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .cal-navbtn:active{background:#f1f3f4;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center;}
  .cal-dow{font-size:11.5px;font-weight:600;color:var(--on-surface-var);padding:4px 0 8px;}
  .cal-day{position:relative;width:36px;height:36px;margin:2px auto;display:flex;align-items:center;justify-content:center;
    font-size:14px;border:1px solid transparent;background:transparent;font-family:var(--font);color:var(--on-surface);
    cursor:pointer;border-radius:50%;transition:background .1s;flex-shrink:0;}
  .cal-day:disabled{color:#d0d2d4;cursor:default;}
  .cal-day:not(:disabled):not(.selected):active{background:var(--rbfa-red-08);}
  .cal-day.today{color:var(--rbfa-red);border-color:var(--rbfa-red);font-weight:500;}
  .cal-day.selected{background:var(--rbfa-red);color:#fff;font-weight:600;border-color:transparent;}
  .cal-day.has-match::after{content:"";position:absolute;bottom:5px;left:50%;transform:translateX(-50%);
    width:5px;height:5px;border-radius:50%;background:var(--rbfa-red);}
  .cal-day.selected.has-match::after{background:#fff;}

  /* ---------- List rows ---------- */
  .row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:#fff;border-bottom:1px solid var(--outline-soft);cursor:pointer;}
  .row:last-child{border-bottom:none;}
  .row.disabled{cursor:not-allowed;background:#fafafa;}
  .row.static{cursor:default;}
  .num{width:34px;height:34px;flex:0 0 34px;border-radius:50%;background:#f1f3f4;border:1px solid var(--outline);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#3c4043;}
  .row .pname{font-weight:500;font-size:15px;}
  .row .psub{font-size:12.5px;color:var(--on-surface-var);}
  .check{width:24px;height:24px;flex:0 0 24px;border:2px solid var(--outline);border-radius:6px;
    display:flex;align-items:center;justify-content:center;}
  .check.radio{border-radius:50%;}
  .check.on{background:var(--rbfa-red);border-color:var(--rbfa-red);}
  .badge{font-size:11px;font-weight:700;padding:3px 8px;border-radius:8px;display:inline-flex;align-items:center;gap:4px;}
  .badge.green{background:var(--green-bg);color:var(--green);}
  .badge.amber{background:var(--amber-bg);color:var(--amber);}
  .badge.red{background:var(--red-bg);color:var(--rbfa-red-dark);}
  .badge.grey{background:#f1f3f4;color:var(--on-surface-var);}
  .badge.blue{background:#e8f0fe;color:var(--blue);}

  .ywarn{display:inline-block;width:10px;height:14px;background:#ffce00;border:1px solid #e6b800;border-radius:2px;
    margin-left:6px;vertical-align:middle;box-shadow:var(--shadow-1);cursor:pointer;}

  /* ---------- Banners ---------- */
  .banner{display:flex;gap:10px;padding:12px 14px;border-radius:12px;font-size:13.5px;line-height:1.45;margin-bottom:14px;}
  .banner.info{background:#e8f0fe;color:#174ea6;}
  .banner.warn{background:var(--amber-bg);color:var(--amber);}
  .banner.err{background:var(--red-bg);color:var(--rbfa-red-dark);}
  .banner.ok{background:var(--green-bg);color:var(--green);}
  .banner svg{flex:0 0 20px;margin-top:1px;}

  /* ---------- Match header / VS ---------- */
  .vs{display:flex;align-items:center;justify-content:space-between;text-align:center;}
  .vs .team{flex:1;}
  .crest{width:46px;height:46px;border-radius:50%;margin:0 auto 6px;display:flex;align-items:center;justify-content:center;
    font-weight:800;color:#fff;font-size:15px;}
  .vs .mid{padding:0 8px;color:#9aa0a6;font-weight:700;font-size:13px;}

  /* meta rows */
  .meta{display:flex;gap:10px;align-items:flex-start;padding:11px 0;border-bottom:1px solid var(--outline-soft);}
  .meta:last-child{border-bottom:none;}
  .meta .mlabel{font-size:12px;color:var(--on-surface-var);}
  .meta .mval{font-size:14.5px;font-weight:500;}

  /* ---------- Snackbar ---------- */
  #snackbar{position:absolute;left:14px;right:14px;bottom:18px;background:#323232;color:#fff;
    border-radius:10px;padding:14px 16px;font-size:14px;box-shadow:var(--shadow-3);z-index:40;
    transform:translateY(140%);transition:transform .25s;display:flex;align-items:center;gap:12px;}
  #snackbar.show{transform:translateY(0);}
  #snackbar .sb-action{color:#ff9a9a;font-weight:700;margin-left:auto;cursor:pointer;white-space:nowrap;}

  /* ---------- Modal / sheet ---------- */
  .overlay{position:absolute;inset:0;background:rgba(0,0,0,.5);z-index:30;display:flex;align-items:flex-end;
    animation:fade .2s;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .sheet{background:#fff;width:100%;border-radius:24px 24px 0 0;padding:20px 18px calc(18px + env(safe-area-inset-bottom));
    animation:slideup .25s;max-height:90%;overflow-y:auto;}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
  .sheet .grip{width:40px;height:4px;border-radius:4px;background:var(--outline);margin:0 auto 16px;}
  .sheet h3{margin:0 0 6px;font-size:19px;}
  .menu-item{display:flex;align-items:center;gap:14px;padding:14px 6px;font-size:15px;cursor:pointer;border-radius:10px;}
  .menu-item:active{background:#f1f3f4;}

  /* misc */
  .empty{text-align:center;color:var(--on-surface-var);padding:48px 24px;}
  .empty svg{opacity:.4;margin-bottom:12px;}
  .divider{height:1px;background:var(--outline-soft);margin:0 16px;}
  .req{display:flex;align-items:center;gap:8px;font-size:13.5px;margin:7px 0;color:var(--on-surface-var);}
  .req.met{color:var(--green);}
  .req.fail{color:var(--rbfa-red-dark);}
  .center-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px 28px;}
  .demo-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.18);color:#fff;
    border:none;font-family:var(--font);font-size:12px;font-weight:600;padding:5px 10px;border-radius:20px;cursor:pointer;}
  a.link{color:var(--rbfa-red);font-weight:600;text-decoration:none;cursor:pointer;}

  /* ============================================================
     REF-SPECIFIC COMPONENTS
     ============================================================ */
  /* Live scoreboard */
  .scoreboard{background:#1f2024;color:#fff;border-radius:0;padding:14px 16px 16px;box-shadow:var(--shadow-1);}
  .scoreboard .sbtop{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;}
  .sb-team{flex:1;text-align:center;}
  .sb-team .crest{width:40px;height:40px;font-size:13px;}
  .sb-team .nm{font-size:12.5px;font-weight:600;margin-top:2px;line-height:1.2;}
  .sb-score{font-size:38px;font-weight:800;letter-spacing:3px;padding:0 6px;min-width:96px;text-align:center;}
  .sb-clock{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:2px;}
  .sb-min{font-variant-numeric:tabular-nums;font-weight:800;font-size:17px;min-width:46px;text-align:center;}
  .sb-stepbtn{width:34px;height:34px;border-radius:50%;border:1px solid rgba(255,255,255,.3);background:transparent;
    color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .sb-stepbtn:active{background:rgba(255,255,255,.15);}
  .livedot{width:8px;height:8px;border-radius:50%;background:#34d058;display:inline-block;
    box-shadow:0 0 0 0 rgba(52,208,88,.7);animation:pulse 1.6s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(52,208,88,.6)}70%{box-shadow:0 0 0 7px rgba(52,208,88,0)}100%{box-shadow:0 0 0 0 rgba(52,208,88,0)}}

  /* Quick actions during live */
  .qa-row{display:flex;gap:10px;padding:14px 16px 4px;}
  .qa{flex:1;border:none;border-radius:14px;padding:14px 8px;font-family:var(--font);font-weight:600;font-size:14px;
    cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;box-shadow:var(--shadow-1);}
  .qa.primary{background:var(--rbfa-red);color:#fff;}
  .qa.primary:active{background:var(--rbfa-red-dark);}
  .qa.tonal{background:#fff;color:var(--on-surface);border:1px solid var(--outline);}
  .qa:disabled{background:#eee;color:#9aa0a6;box-shadow:none;cursor:not-allowed;}

  /* Event timeline rows */
  .evt{display:flex;align-items:center;gap:11px;padding:11px 14px;background:#fff;border-bottom:1px solid var(--outline-soft);}
  .evt:last-child{border-bottom:none;}
  .evt .emin{width:34px;flex:0 0 34px;font-weight:800;font-size:13px;color:var(--on-surface-var);text-align:right;font-variant-numeric:tabular-nums;}
  .evt .eico{width:32px;height:32px;flex:0 0 32px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#f1f3f4;}
  .evt .etxt{flex:1;min-width:0;}
  .evt .etitle{font-size:14px;font-weight:600;}
  .evt .esub{font-size:12px;color:var(--on-surface-var);}
  .evt .edel{width:34px;height:34px;flex:0 0 34px;border:none;background:transparent;border-radius:50%;cursor:pointer;
    display:flex;align-items:center;justify-content:center;}
  .evt .edel:active{background:#f1f3f4;}

  /* Card glyphs */
  .cardico{display:inline-block;width:12px;height:16px;border-radius:2px;vertical-align:middle;box-shadow:var(--shadow-1);}
  .cardico.y{background:#ffce00;border:1px solid #e6b800;}
  .cardico.r{background:var(--rbfa-red);border:1px solid var(--rbfa-red-dark);}
  .cardico.yr{background:linear-gradient(135deg,#ffce00 0 45%,var(--rbfa-red) 55% 100%);border:1px solid #c99a00;}

  /* Event-type tiles (US-MI-03) */
  .tilegrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:8px 0 4px;}
  .tile{border:1px solid var(--outline);border-radius:16px;padding:18px 12px;display:flex;flex-direction:column;
    align-items:center;gap:9px;cursor:pointer;background:#fff;text-align:center;transition:transform .05s;}
  .tile:active{transform:scale(.98);background:#f7f8f9;}
  .tile .tl{font-weight:700;font-size:14.5px;}
  .tile .ts{font-size:11.5px;color:var(--on-surface-var);line-height:1.3;}
  .tile .ticon{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;}

  /* Team selector inside forms */
  .teamsel{display:flex;gap:10px;margin-bottom:18px;}
  .teamsel button{flex:1;height:58px;border:1px solid var(--outline);border-radius:12px;background:#fff;
    font-weight:600;font-family:var(--font);font-size:13.5px;cursor:pointer;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:3px;color:var(--on-surface);}
  .teamsel button .ts-side{font-size:11px;color:var(--on-surface-var);font-weight:500;}
  .teamsel button.on{border-color:var(--rbfa-red);background:var(--rbfa-red-08);color:var(--rbfa-red-dark);box-shadow:inset 0 0 0 1px var(--rbfa-red);}
  .teamsel button.on .ts-side{color:var(--rbfa-red-dark);}

  /* Inline option chips (goal type) */
  .optrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px;}
  .opt{border:1px solid var(--outline);background:#fff;border-radius:10px;height:40px;padding:0 14px;font-size:13.5px;
    font-weight:600;color:var(--on-surface);cursor:pointer;display:inline-flex;align-items:center;gap:6px;}
  .opt.on{background:var(--rbfa-red-12);border-color:transparent;color:var(--rbfa-red-dark);}

  /* Minute stepper inside forms */
  .stepper{display:flex;align-items:center;border:1px solid var(--outline);border-radius:10px;overflow:hidden;width:fit-content;}
  .stepper button{width:48px;height:50px;border:none;background:#fff;font-size:22px;cursor:pointer;color:var(--rbfa-red);}
  .stepper button:active{background:var(--rbfa-red-08);}
  .stepper .mval{width:66px;height:50px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;
    border-left:1px solid var(--outline);border-right:1px solid var(--outline);font-variant-numeric:tabular-nums;}

  /* Pick list inside form (scroll-limited) */
  .picklist{border:1px solid var(--outline-soft);border-radius:12px;overflow:hidden;max-height:230px;overflow-y:auto;margin-bottom:6px;}

  /* Substitution OUT/IN live preview (US-MI-01) */
  .swap-preview{display:flex;align-items:center;gap:10px;background:#f3f6fb;border:1px solid var(--outline-soft);border-radius:14px;padding:12px;margin-bottom:4px;}
  .swap-side{flex:1;min-width:0;text-align:center;}
  .swap-tag{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;letter-spacing:.02em;padding:2px 8px;border-radius:8px;margin-bottom:6px;}
  .swap-tag.off{background:var(--rbfa-red-08);color:var(--rbfa-red-dark);}
  .swap-tag.on{background:var(--green-bg);color:var(--green);}

const $ = (id)=>document.getElementById(id);
function fmtTime(min){const h=Math.floor(min/60),m=min%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');}
function activeMatch(){return MATCHES.find(m=>m.id===state.activeMatchId);}
function team(key){return key==='home'?HOME:AWAY;}
function other(key){return key==='home'?'away':'home';}
function pById(pid){return [...HOME.players,...AWAY.players].find(p=>p.pid===pid);}
function teamOf(pid){return pid[0]==='H'?'home':'away';}
function initials(name){return name.split(' ').filter(w=>w.length>2).slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function captainOf(key){return team(key).players.find(p=>p.captain);}
function delegateOf(key){return team(key).officials.find(o=>o.delegate);}
function isLate(key){return team(key).lateSubmission;}

let snackTimer=null;
function snack(msg, actionLabel, actionFn){
  const sb=$('snackbar');
  sb.innerHTML = '<span>'+msg+'</span>' + (actionLabel?'<span class="sb-action" id="sbAction">'+actionLabel+'</span>':'');
  sb.classList.add('show');
  if(actionLabel){$('sbAction').onclick=()=>{sb.classList.remove('show');actionFn&&actionFn();};}
  clearTimeout(snackTimer);
  snackTimer=setTimeout(()=>sb.classList.remove('show'), actionLabel?5000:2600);
}
function go(screen){ state.screen=screen; render(); $('screen').scrollTop=0; }

/* ---------- Overlay / bottom-sheet helpers ---------- */
function openSheet(innerHtml){
  closeSheet();
  const ov=document.createElement('div'); ov.className='overlay'; ov.id='ovl';

  ov.innerHTML=`<div class="sheet" id="sheetBody"><div class="grip"></div>${innerHtml}</div>`;
  $('phone').appendChild(ov);
}
function refreshSheet(innerHtml){ const b=$('sheetBody'); if(b) b.innerHTML=`<div class="grip"></div>${innerHtml}`; }
function closeSheet(){ $('ovl')?.remove(); }

   DERIVED MATCH STATE — pure reducer over state.events
   Replaying from scratch keeps add/delete fully consistent
   (US-MI-07 / US-FS-03), incl. auto yellow/red (US-MI-13).
   ============================================================ */
function recompute(){
  const pitch={home:new Set(),away:new Set()};
  HOME.players.filter(p=>p.role==='starter').forEach(p=>pitch.home.add(p.pid));
  AWAY.players.filter(p=>p.role==='starter').forEach(p=>pitch.away.add(p.pid));
  const sentOff=new Set(), cameOn=new Set(), yellowCount={};
  const subsUsed={home:0,away:0}, score={home:0,away:0};
  // replay in insertion order (chronological as entered by the REF)
  state.events.forEach(ev=>{
    if(ev.type==='goal'){ score[ev.creditedTeam]++; }
    else if(ev.type==='yellow'){
      yellowCount[ev.pid]=(yellowCount[ev.pid]||0)+1;
      if(yellowCount[ev.pid]===2){ sentOff.add(ev.pid); pitch[teamOf(ev.pid)].delete(ev.pid); }  // auto yellow/red (US-MI-13)
    }
    else if(ev.type==='red'){ sentOff.add(ev.pid); pitch[teamOf(ev.pid)].delete(ev.pid); }
    else if(ev.type==='sub'){
      pitch[ev.team].delete(ev.outId); pitch[ev.team].add(ev.inId);
      cameOn.add(ev.inId); subsUsed[ev.team]++;
    }
  });
  state.pitch=pitch; state.sentOff=sentOff; state.cameOn=cameOn;
  state.yellowCount=yellowCount; state.subsUsed=subsUsed; state.score=score;
}
function onPitch(key){ return team(key).players.filter(p=>state.pitch[key].has(p.pid)).sort((a,b)=>a.nr-b.nr); }
function benchAvailable(key){ // substitutes not yet used and not sent off
  return team(key).players.filter(p=>p.role==='sub' && !state.cameOn.has(p.pid) && !state.sentOff.has(p.pid)).sort((a,b)=>a.nr-b.nr);
}

   ============================================================ */

  const sb=$('statusbar');
  const light = ['login'].includes(state.screen);
  sb.className = 'status-bar'+(light?' light':'');

    case 'dashboard': html=ScDashboard(); break;

    case 'teamsheet': html=ScTeamSheet(); break;
    case 'live':      html=ScLive(); break;
    case 'post':      html=ScPost(); break;

  const scr=$('screen');
  const prevScrollEl = scr.querySelector('.scroll');
  const prevScroll = prevScrollEl ? prevScrollEl.scrollTop : 0;
  scr.innerHTML = html;
  const nextScrollEl = scr.querySelector('.scroll');
  if(nextScrollEl) nextScrollEl.scrollTop = prevScroll;
}

function fmtDateShort(iso){
  const d=new Date(iso+'T00:00:00');

function onDashSearch(v){
  state.dashSearch=v;
  const next = MATCHES.filter(m=>matchListStatus(m)!=='SUBMITTED');
  const prev = MATCHES.filter(m=>matchListStatus(m)==='SUBMITTED');
  $('matchList').innerHTML=MatchList(state.dashTab==='next'?next:prev, state.dashTab);
}
function MatchList(list, tab){
  // apply search + filters
  let r=list.filter(m=>{
    const s=state.dashSearch.toLowerCase().trim();
    const matchS = !s || m.away.toLowerCase().includes(s) || m.home.toLowerCase().includes(s)
       || m.venue.toLowerCase().includes(s);
    const matchDate = !state.dashDateFilter || m.date===state.dashDateFilter;
    const matchComp = !state.dashCompFilters.length || state.dashCompFilters.includes(m.competition);
    return matchS && matchDate && matchComp;
  });
  if(!r.length) return `<div class="empty">${I.search}<p>No matches found.<br/>Adjust your search term or filters.</p></div>`;
  r=r.slice().sort((a,b)=> tab==='next' ? a.date.localeCompare(b.date) : b.date.localeCompare(a.date));
  const hero=r[0], rest=r.slice(1);
  let html = `<div class="section-title" style="margin-top:2px;">${tab==='next'?'Next match':'Most recent match'}</div>` + MatchCard(hero);

    html += `<div class="card">${rest.map(m=>CompactRow(m)).join('')}</div>`;
  }
  return html;
}

/* ---------- Date filter (calendar picker) ---------- */
function openDateFilterSheet(){
  state.calMonth = activeMatch().date.slice(0,7);
  const ov=document.createElement('div'); ov.className='overlay'; ov.onclick=e=>{if(e.target===ov)ov.remove();};
  ov.innerHTML=`<div class="sheet" id="dateSheet"><div class="grip"></div>${DatePickerSheetBody()}</div>`;
  $('phone').appendChild(ov);
}
function DatePickerSheetBody(){
  const [y,mo]=state.calMonth.split('-').map(Number);
  const first=new Date(y,mo-1,1);
  const startDow=(first.getDay()+6)%7; // Monday-first grid
  const daysInMonth=new Date(y,mo,0).getDate();
  const monthLabel=first.toLocaleDateString('en-GB',{month:'long',year:'numeric'});
  const todayIso=activeMatch().date;
  const tabMatches = state.dashTab==='next' ? MATCHES.filter(m=>matchListStatus(m)!=='SUBMITTED') : MATCHES.filter(m=>matchListStatus(m)==='SUBMITTED');
  const matchDates=new Set(tabMatches.map(m=>m.date));
  let cells='';
  for(let i=0;i<startDow;i++) cells+=`<span></span>`;
  for(let d=1;d<=daysInMonth;d++){
    const iso=`${y}-${String(mo).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const cls=['cal-day'];
    if(iso===todayIso) cls.push('today');
    if(iso===state.dashDateFilter) cls.push('selected');
    if(matchDates.has(iso)) cls.push('has-match');
    cells+=`<button class="${cls.join(' ')}" onclick="selectFilterDate('${iso}')">${d}</button>`;
  }
  return `
    <h3>Filter by date</h3>
    <p style="color:var(--on-surface-var);font-size:13px;margin:0 0 16px;">Pick a match day. Days with a ${state.dashTab==='next'?'scheduled':'previous'} match are marked with a dot.</p>
    <div class="cal-head">
      <button class="cal-navbtn" onclick="navCalMonth(-1)">${I.chevL}</button>
      <span class="lbl">${monthLabel}</span>
      <button class="cal-navbtn" onclick="navCalMonth(1)">${I.chevR}</button>
    </div>
    <div class="cal-grid">
      <span class="cal-dow">Mo</span><span class="cal-dow">Tu</span><span class="cal-dow">We</span>
      <span class="cal-dow">Th</span><span class="cal-dow">Fr</span><span class="cal-dow">Sa</span><span class="cal-dow">Su</span>
      ${cells}
    </div>
    ${state.dashDateFilter?`<button class="btn btn-text" style="width:100%;margin-top:14px;" onclick="clearDateFilter();this.closest('.overlay').remove()">Clear date filter</button>`:''}
  `;
}
function navCalMonth(delta){
  let [y,mo]=state.calMonth.split('-').map(Number);
  mo+=delta;
  if(mo<1){mo=12;y--;} if(mo>12){mo=1;y++;}
  state.calMonth=`${y}-${String(mo).padStart(2,'0')}`;
  $('dateSheet').innerHTML=`<div class="grip"></div>${DatePickerSheetBody()}`;
}
function selectFilterDate(iso){
  state.dashDateFilter = (state.dashDateFilter===iso) ? null : iso;
  document.querySelector('.overlay')?.remove();

}

function badgeDot(key){
  const d=SHEET_STATUS[state.sheet[key]];
  return `<span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${DOT_COLOR[d.badge]};vertical-align:middle;margin-left:2px;"></span>`;
}
function playerReviewRow(p){
  const cap = p.captain;
  return `

      <div class="pname">${p.name}${cap?' <span class="badge amber" style="margin-left:4px;">C</span>':''}${p.warn?'<span class="ywarn" title="Eligibility advisory"></span>':''}</div>
      ${(p.pos==='Goalkeeper'||p.warn)?`<div class="psub">${p.pos==='Goalkeeper'?p.pos:''}${p.pos==='Goalkeeper'&&p.warn?' · ':''}${p.warn?'<span style="color:var(--amber)">tap for details</span>':''}</div>`:''}

}
function showEligibility(pid){  // US-VS-03 — tap warning for the reason
  const p=pById(pid);
  openSheet(`
    <h3>Eligibility advisory</h3>
    <div style="display:flex;align-items:center;gap:10px;margin:10px 0 14px;">
      <div class="num">${p.nr}</div><div><b>${p.name}</b><div style="font-size:12.5px;color:var(--on-surface-var);">${p.pos==='Goalkeeper'?p.pos+' · ':''}${teamOf(pid)==='home'?HOME.name:AWAY.name}</div></div>
    </div>
    <div class="banner warn" style="margin:0 0 14px;">${I.warn}<div>${p.warn}</div></div>
    <p style="font-size:13px;color:var(--on-surface-var);margin:0 0 14px;line-height:1.5;">This is a <b>non-blocking advisory</b>. The player is eligible for today's match; it is shown so you are aware ahead of any further caution.</p>
    <button class="btn btn-primary" onclick="closeSheet()">Got it</button>`);
}
function validationChecks(key){   // US-VS-05 — regulation checks
  const t=team(key);
  const starters=t.players.filter(p=>p.role==='starter').length;
  const ineligible=t.players.filter(p=>p.eligible===false).length;
  return [
    {label:'At least 11 eligible starting players ('+starters+' listed)', ok:starters>=RULES.starters && ineligible===0},
    {label:'A captain is designated', ok:!!captainOf(key)},
    {label:'A team delegate is present among the officials', ok:!!delegateOf(key)},
    {label:'Squad within regulation size ('+t.players.length+' players)', ok:t.players.length<=23},
  ];
}
function validateTeam(key){   // US-VS-05
  state.sheet[key]='VALIDATED';
  state.correction[key]=null;
  if(state.sheet.home==='VALIDATED' && state.sheet.away==='VALIDATED') state.matchStatus='READY';  // §1 lifecycle
  const otherKey=other(key);
  if(state.sheet[otherKey]!=='VALIDATED'){
    snack(team(key).name+' validated. Now review '+team(otherKey).name+'.', 'Switch', ()=>{state.teamTab=otherKey;render();});
  } else {
    snack('Both teams validated — ready for kick-off.');
  }
  render();
}
function openCorrectionSheet(key){   // US-VS-07
  const t=team(key);
  state.form={issue:''};
  openSheet(correctionBody(key));
}
function correctionBody(key){
  const t=team(key);
  return `
    <h3>Request a correction</h3>
    <p style="color:var(--on-surface-var);font-size:13px;margin:0 0 14px;line-height:1.5;">Describe the issue on ${t.name}'s match sheet. The Team Responsible is notified and can correct and resubmit before kick-off.</p>
    <div class="field"><label>Issue for the team to resolve</label>
      <textarea id="corrTxt" placeholder="e.g. Player #9 is listed twice / captain not designated / ..." oninput="state.form.issue=this.value">${state.form.issue||''}</textarea></div>
    <button class="btn btn-primary" onclick="sendCorrection('${key}')">${I.send} Send correction request</button>
    <div style="height:8px"></div>
    <button class="btn btn-text" style="width:100%" onclick="closeSheet()">Cancel</button>`;
}
function sendCorrection(key){
  const txt=(state.form.issue||'').trim();
  if(!txt){ snack('Describe the issue first.'); return; }
  state.sheet[key]='NEEDS_REVISION';
  state.correction[key]=txt;
  if(state.matchStatus==='READY') state.matchStatus='SCHEDULED';
  closeSheet(); render();
  snack('Correction request sent to '+team(key).name+'.');
}
function simulateResubmit(key){   // demo affordance for US-VS-07 resubmission loop
  state.sheet[key]='PENDING_REVIEW';
  state.correction[key]=null;
  render();
  snack(team(key).name+' resubmitted a corrected sheet. You can re-validate.');
}

/* ---------- Start match (US-VS-09/10) ---------- */
function confirmStartMatch(){
  const m=activeMatch();
  const late = state.nowMin>m.kickoffMin;
  openSheet(`
    <h3>Start the match?</h3>
    <p style="color:var(--on-surface-var);line-height:1.5;margin:0 0 14px;">Both teams are validated. Starting the match sets the status to <b>In progress</b> and records the official kick-off time. Event registration becomes available.</p>
    <div class="banner ${late?'warn':'ok'}" style="margin-bottom:14px;">${late?I.warn:I.check}<div>Kick-off time will be recorded as <b>${fmtTime(state.nowMin)}</b>${late?' — after the scheduled '+m.kickoff+'.':' (scheduled '+m.kickoff+').'}</div></div>
    <button class="btn btn-green" onclick="startMatch()">${I.play} Start match now</button>
    <div style="height:8px"></div>
    <button class="btn btn-text" style="width:100%" onclick="closeSheet()">Cancel</button>`);
}
function startMatch(){
  closeSheet();
  state.matchStatus='IN_PROGRESS';   // §1 lifecycle
  state.kickoffActual=fmtTime(state.nowMin);   // US-VS-10
  state.half=1; state.liveMinute=1;
  go('live');
  snack('Match started — kick-off recorded at '+state.kickoffActual+'.');
}

/* ============================================================
   GOAL 4 — MANAGE MATCH IN PROGRESS
   Live hub: scoreboard + actions + timeline/line-ups (US-MI-08)
   ============================================================ */
function ScLive(){
  const m=activeMatch();
  const ht = state.matchStatus==='HALF_TIME';
  const inPlay = state.matchStatus==='IN_PROGRESS';
  const canRegister = inPlay||ht;   // half-time corrections are allowed too — only the minute needs adjusting
  return `
  <div class="appbar"><button class="iconbtn" onclick="go('dashboard')">${I.back}</button>
    <span class="title">Live match</span>
    <button class="iconbtn" onclick="openLiveMenu()">${I.menu}</button>
  </div>
  ${Scoreboard()}
  <div class="qa-row">
    <button class="qa tonal" ${canRegister?'':'disabled'} onclick="openEventPicker()">${I.plus} Add event</button>
    <button class="qa tonal" ${canRegister?'':'disabled'} onclick="openSubForm()">${I.swap} Substitution</button>
  </div>
  ${ht?`<div class="pad" style="padding:10px 16px 0;"><div class="banner amber" style="margin:0;background:var(--amber-bg);color:var(--amber);">${I.flag}<div><b>Half-time.</b> The clock is paused — set the minute on each form when registering an event or substitution.</div></div></div>`:''}
  <div class="segmented" style="margin-top:12px;">
    <button class="${state.liveTab==='timeline'?'active':''}" onclick="state.liveTab='timeline';render()">Timeline</button>
    <button class="${state.liveTab==='lineups'?'active':''}" onclick="state.liveTab='lineups';render()">Line-ups</button>
  </div>
  <div class="scroll">
    ${state.liveTab==='timeline'?TimelineView(true):LineupsView()}
    <div style="height:10px"></div>
  </div>
  <div class="bottom-bar">${liveBottom()}</div>`;
}
function Scoreboard(){
  const m=activeMatch();
  const ht=state.matchStatus==='HALF_TIME';
  const phase = ht?'Half-time' : (state.half===1?'1st half':'2nd half');
  return `
  <div class="scoreboard">
    <div class="sbtop">
      <div class="sb-team"><div class="crest" style="background:var(--rbfa-red)">${initials(HOME.name)}</div><div class="nm">${HOME.short}</div></div>
      <div class="sb-score">${state.score.home} : ${state.score.away}</div>
      <div class="sb-team"><div class="crest" style="background:#5f6368">${initials(AWAY.name)}</div><div class="nm">${AWAY.short}</div></div>
    </div>
    <div class="sb-clock">
      ${ht?'':`<button class="sb-stepbtn" onclick="bumpMinute(-1)">−</button>`}
      <span class="sb-min">${ht?'HT':state.liveMinute+"'"}</span>
      ${ht?'':`<button class="sb-stepbtn" onclick="bumpMinute(1)">+</button>`}
    </div>
    <div style="text-align:center;margin-top:8px;display:flex;align-items:center;gap:7px;justify-content:center;font-size:12px;color:#cfd2d6;">
      ${ht?'':'<span class="livedot"></span>'} ${phase} · kick-off ${state.kickoffActual||activeMatch().kickoff}
    </div>
  </div>`;
}
function bumpMinute(d){ state.liveMinute=Math.max(1,state.liveMinute+d); render(); }
// Default minute proposed when opening a goal/card/substitution form. While
// the match is actually running this follows the ticking live clock; during
// half-time the clock is paused so it proposes the end of the first half
// (45'), and once the match has ended it proposes the end of the second
// half (90') — both still correctable via the minute stepper (US-MI-01/03).
function defaultEventMinute(){
  if(state.matchStatus==='HALF_TIME') return 45;
  if(state.matchStatus==='ENDED') return 90;
  return state.liveMinute;
}

function liveBottom(){
  if(state.matchStatus==='HALF_TIME')
    return `<button class="btn btn-green" onclick="confirmSecondHalf()">${I.play} Start second half</button>`;
  if(state.half===1)
    return `<button class="btn btn-dark" onclick="confirmEndHalf('first')">${I.flag} End first half</button>`;
  return `<button class="btn btn-primary" onclick="confirmEndHalf('match')">${I.stop} End match</button>`;
}

/* ---------- Live overview: timeline (US-MI-08) ---------- */
function TimelineView(allowDelete){
  const rows=timelineRows(allowDelete);
  if(!rows) return `<div class="empty">${I.ball}<p>No events yet.<br/>Use “Add event” or “Substitution”.</p></div>`;
  return `<div style="background:#fff;">${rows}</div>`;
}
function timelineRows(allowDelete){
  const evs=state.events.slice().sort((a,b)=> (a.minute-b.minute) || (a.seq-b.seq));
  if(!evs.length) return '';
  const yc={}; let out='';
  evs.forEach(ev=>{
    out+=EvtRow(ev, allowDelete);
    if(ev.type==='yellow'){ yc[ev.pid]=(yc[ev.pid]||0)+1; if(yc[ev.pid]===2) out+=YellowRedRow(ev); }
  });
  return out;
}
function EvtRow(ev, allowDelete){
  const p = ev.pid?pById(ev.pid):null;
  let ico, title, sub, sideName;
  if(ev.type==='goal'){
    const scorer=pById(ev.scorerPid);
    sideName = (ev.creditedTeam==='home'?HOME.short:AWAY.short);
    ico=`<div class="eico" style="background:var(--green-bg);">${I.ball.replace('width="20" height="20"','width="18" height="18"').replace('fill="currentColor"','fill="#1e8e3e"')}</div>`;
    title=`${scorer.name} <span style="font-weight:600;color:var(--on-surface-var);">#${scorer.nr}</span>`;
    const tag = ev.goalType==='penalty'?' · penalty':(ev.goalType==='own'?' · own goal':'');
    sub=`Goal — ${sideName}${tag}`;
  } else if(ev.type==='yellow'){
    ico=`<div class="eico"><span class="cardico y"></span></div>`;
    title=`${p.name} <span style="font-weight:600;color:var(--on-surface-var);">#${p.nr}</span>`;
    sub=`Yellow card — ${teamOf(ev.pid)==='home'?HOME.short:AWAY.short}`;
  } else if(ev.type==='red'){
    ico=`<div class="eico"><span class="cardico r"></span></div>`;
    title=`${p.name} <span style="font-weight:600;color:var(--on-surface-var);">#${p.nr}</span>`;
    sub=`Red card (sent off) — ${teamOf(ev.pid)==='home'?HOME.short:AWAY.short}`;
  } else if(ev.type==='sub'){
    const pin=pById(ev.inId), pout=pById(ev.outId);
    ico=`<div class="eico" style="background:#e8f0fe;">${I.swap.replace('width="20" height="20"','width="17" height="17"').replace('fill="currentColor"','fill="#1a73e8"')}</div>`;
    title=`<span style="color:var(--green);font-weight:700;">▲</span> ${pin.name} <span style="color:var(--on-surface-var);font-weight:600;">#${pin.nr}</span>`;
    sub=`<span style="color:var(--rbfa-red-dark);font-weight:700;">▼</span> ${pout.name} #${pout.nr} — ${ev.team==='home'?HOME.short:AWAY.short}`;
  }
  return `
  <div class="evt">
    <div class="emin">${ev.minute}'</div>
    ${ico}
    <div class="etxt"><div class="etitle">${title}</div><div class="esub">${sub}</div></div>
    ${allowDelete?`<button class="edel" onclick="deleteEvent(${ev.id})" title="Delete">${I.trash}</button>`:''}
  </div>`;
}
function YellowRedRow(yEv){  // derived display for the automatic second-caution red (US-MI-13)
  const p=pById(yEv.pid);
  return `
  <div class="evt" style="background:#fff7f6;">
    <div class="emin">${yEv.minute}'</div>
    <div class="eico"><span class="cardico yr"></span></div>
    <div class="etxt"><div class="etitle">${p.name} <span style="font-weight:600;color:var(--on-surface-var);">#${p.nr}</span></div>
      <div class="esub">Yellow/red — second caution, sent off <span style="color:var(--on-surface-var);">(auto)</span></div></div>
    <div style="width:34px;flex:0 0 34px;"></div>
  </div>`;
}

/* ---------- Live overview: line-ups (US-MI-08) ---------- */
function LineupsView(){
  const block=(key)=>{
    const t=team(key);
    const pitch=onPitch(key);
    const bench=benchAvailable(key);
    const off=[...state.sentOff].filter(pid=>teamOf(pid)===key).map(pById).sort((a,b)=>a.nr-b.nr);
    return `
      <div class="section-title" style="margin-left:16px;">${t.name} · on pitch ${pitch.length}</div>
      <div style="background:#fff;">${pitch.map(p=>lineupRow(p,'pitch')).join('')}</div>
      <div class="section-title" style="margin-left:16px;">Bench (${bench.length}) · subs used ${state.subsUsed[key]}/${subRules().maxSubs}</div>
      <div style="background:#fff;">${bench.length?bench.map(p=>lineupRow(p,'bench')).join(''):emptyMini('No substitutes left.')}</div>
      ${off.length?`<div class="section-title" style="margin-left:16px;">Sent off (${off.length})</div><div style="background:#fff;">${off.map(p=>lineupRow(p,'off')).join('')}</div>`:''}`;
  };
  return `${block('home')}<div style="height:8px"></div>${block('away')}`;
}
function lineupRow(p,kind){
  const yc=state.yellowCount[p.pid]||0;
  const cards = yc>0?'<span class="cardico y" style="margin-left:6px;"></span>'+(yc>1?'<span class="cardico yr" style="margin-left:3px;"></span>':''):'';
  const red = state.sentOff.has(p.pid)&&yc<2?'<span class="cardico r" style="margin-left:6px;"></span>':'';
  return `
  <div class="row static">
    <div class="num">${p.nr}</div>
    <div style="flex:1;"><div class="pname">${p.name}${p.captain?' <span class="badge amber" style="margin-left:4px;">C</span>':''}${cards}${red}</div>
      ${posSub(p)}</div>
    ${kind==='off'?'<span class="badge red">Sent off</span>':(kind==='bench'?'<span class="badge grey">Bench</span>':'<span class="badge green">On pitch</span>')}
  </div>`;
}
function emptyMini(t){return `<div style="padding:12px 16px;color:var(--on-surface-var);font-size:13px;">${t}</div>`;}
function posSub(p){return p.pos==='Goalkeeper' ? '<div class="psub">'+p.pos+'</div>' : '';}

/* ---------- Add event entry point — type tiles (US-MI-03) ---------- */
function openEventPicker(){
  openSheet(`
    <h3>Add match event</h3>
    <p style="color:var(--on-surface-var);font-size:13px;margin:0 0 6px;">Minute ${defaultEventMinute()}' · ${state.half===1?'first':'second'} half. Choose the event type.</p>

      </div>
      <div class="tile" onclick="openCardForm('yellow')">
        <div class="ticon" style="background:#fff7d6;"><span class="cardico y" style="width:18px;height:24px;"></span></div>
        <div class="tl">Yellow card</div><div class="ts">Caution for a player</div>
      </div>
      <div class="tile" onclick="openCardForm('red')">
        <div class="ticon" style="background:var(--red-bg);"><span class="cardico r" style="width:18px;height:24px;"></span></div>
        <div class="tl">Red card</div><div class="ts">Direct sending-off</div>

/* ---------- Goal form (US-MI-04) ---------- */
function openGoalForm(){
  state.form={kind:'goal', team:null, goalType:'regular', scorerPid:null, minute:defaultEventMinute()};
  refreshSheet(goalBody());
}
function goalBody(){
  const f=state.form;
  // For an own goal, the scorer is an opponent player; the goal is credited to f.team.
  const scorerTeam = f.team ? (f.goalType==='own'?other(f.team):f.team) : null;
  const list = scorerTeam ? onPitch(scorerTeam) : [];
  return `
    <h3>Register goal</h3>
    ${TeamSelector('selGoalTeam')}
    ${f.team?`
      <label style="display:block;font-size:13px;color:var(--on-surface-var);margin-bottom:6px;font-weight:500;">Goal type</label>
      <div class="optrow" style="margin-bottom:14px;">
        ${goalTypeOpt('regular','Regular')}${goalTypeOpt('penalty','Penalty')}${goalTypeOpt('own','Own goal')}
      </div>
      ${f.goalType==='own'?`<div class="banner info" style="margin-bottom:12px;">${I.info}<div>Own goal — select the <b>${(scorerTeam==='home'?HOME.short:AWAY.short)}</b> player who scored it. The goal counts for <b>${(f.team==='home'?HOME.short:AWAY.short)}</b>.</div></div>`:''}
      <label style="display:block;font-size:13px;color:var(--on-surface-var);margin-bottom:6px;font-weight:500;">${f.goalType==='own'?'Own-goal player':'Scorer'} (on pitch)</label>
      <div class="picklist">${pickRows(list, f.scorerPid, 'setGoalScorer')}</div>
      ${MinuteStepper()}
    `:`<p style="color:var(--on-surface-var);font-size:13px;">Select the team that scored to continue.</p>`}
    <button class="btn btn-primary" style="margin-top:14px;" ${f.team&&f.scorerPid?'':'disabled'} onclick="confirmGoal()">${I.ball.replace('width="20" height="20"','width="18" height="18"')} Register goal</button>
    <div style="height:8px"></div>
    <button class="btn btn-text" style="width:100%" onclick="closeSheet()">Cancel</button>`;
}
function goalTypeOpt(v,label){ return `<button class="opt ${state.form.goalType===v?'on':''}" onclick="setGoalType('${v}')">${label}</button>`; }
function setGoalType(v){ state.form.goalType=v; state.form.scorerPid=null; refreshSheet(goalBody()); }
function setGoalScorer(pid){ state.form.scorerPid=pid; refreshSheet(goalBody()); }
function confirmGoal(){
  const f=state.form;
  const reverted=pushEvent({type:'goal', creditedTeam:f.team, scorerPid:f.scorerPid, goalType:f.goalType, minute:clampMin(f.minute)});
  closeSheet(); render();
  const sc=pById(f.scorerPid);
  snack('Goal registered — '+sc.name+(f.goalType==='own'?' (own goal)':'')+', '+clampMin(f.minute)+"'. Score "+state.score.home+'–'+state.score.away+'.'+(reverted?' Match sheet reopened for correction — reconfirm before submitting.':''));
}

/* ---------- Card form (US-MI-05 yellow / US-MI-06 red, US-MI-13 auto) ---------- */
function openCardForm(color){
  state.form={kind:'card', color, team:null, pid:null, minute:defaultEventMinute()};
  refreshSheet(cardBody());
}
function cardBody(){
  const f=state.form;
  const list = f.team?onPitch(f.team):[];
  const isRed=f.color==='red';
  return `
    <h3>Register ${isRed?'red':'yellow'} card</h3>
    <div style="display:flex;align-items:center;gap:8px;margin:-2px 0 14px;color:var(--on-surface-var);font-size:13px;">
      <span class="cardico ${isRed?'r':'y'}" style="width:16px;height:21px;"></span>${isRed?'Direct sending-off.':'Caution — a second yellow becomes an automatic yellow/red.'}
    </div>
    ${TeamSelector('selCardTeam')}
    ${f.team?`
      <label style="display:block;font-size:13px;color:var(--on-surface-var);margin-bottom:6px;font-weight:500;">Player (on pitch)</label>
      <div class="picklist">${pickRows(list, f.pid, 'setCardPlayer', true)}</div>
      ${MinuteStepper()}
    `:`<p style="color:var(--on-surface-var);font-size:13px;">Select a team to continue.</p>`}
    <button class="btn ${isRed?'btn-primary':'btn-primary'}" style="margin-top:14px;" ${f.team&&f.pid?'':'disabled'} onclick="confirmCard()">Register ${isRed?'red':'yellow'} card</button>
    <div style="height:8px"></div>
    <button class="btn btn-text" style="width:100%" onclick="closeSheet()">Cancel</button>`;
}
function setCardPlayer(pid){ state.form.pid=pid; refreshSheet(cardBody()); }
function confirmCard(){
  const f=state.form;
  const min=clampMin(f.minute);
  const priorY=state.yellowCount[f.pid]||0;
  if(f.color==='yellow'){
    const reverted=pushEvent({type:'yellow', pid:f.pid, minute:min});
    closeSheet(); render();
    const p=pById(f.pid);
    const tail=reverted?' Match sheet reopened for correction — reconfirm before submitting.':'';
    if(priorY+1>=2) snack('Second yellow for '+p.name+' — automatic yellow/red. Player sent off.'+tail);
    else snack('Yellow card — '+p.name+', '+min+"'."+tail);
  } else {
    const reverted=pushEvent({type:'red', pid:f.pid, minute:min});
    closeSheet(); render();
    snack('Red card — '+pById(f.pid).name+' sent off, '+min+"'."+(reverted?' Match sheet reopened for correction — reconfirm before submitting.':''));
  }
}

/* ---------- Substitution form (US-MI-01) ----------
   Step-by-step "wissel" wizard: pick the team, then the player coming
   off, then the player coming on — one decision at a time, with a
   live OUT⇄IN preview, so the REF can never lose track mid-swap.
   Every swap is checked against subRules() for the active match's
   competition (US-MI-01 / competition regulations). ---------- */
function openSubForm(){
  state.form={kind:'sub', team:null, outId:null, inId:null, minute:defaultEventMinute()};
  openSheet(subBody());
}
function subSwapPreview(f){
  const pout=f.outId?pById(f.outId):null, pin=f.inId?pById(f.inId):null;
  if(!pout && !pin) return '';
  return `
  <div class="swap-preview">
    <div class="swap-side">
      <div class="swap-tag off">${I.warn.replace('width="20" height="20"','width="13" height="13"').replace('fill="currentColor"','fill="var(--rbfa-red-dark)"')} OFF</div>
      ${pout?`<div class="swap-name">#${pout.nr} ${pout.name}</div>`:`<div class="swap-name muted">Choose player…</div>`}
      ${pout?`<button class="swap-change" onclick="setSubOut(null)">Change</button>`:''}
    </div>
    <div class="swap-arrow">${I.swap.replace('width="20" height="20"','width="20" height="20"').replace('fill="currentColor"','fill="#1a73e8"')}</div>
    <div class="swap-side">
      <div class="swap-tag on">${I.check.replace('width="20" height="20"','width="13" height="13"').replace('fill="#fff"','fill="var(--green)"')} ON</div>
      ${pin?`<div class="swap-name">#${pin.nr} ${pin.name}</div>`:`<div class="swap-name muted">Choose player…</div>`}
      ${pin?`<button class="swap-change" onclick="setSubIn(null)">Change</button>`:''}
    </div>
  </div>`;
}
function subBody(){
  const f=state.form;
  const rules=subRules();
  const reached = f.team && state.subsUsed[f.team]>=rules.maxSubs;
  const outList = f.team?onPitch(f.team):[];
  const inList = f.team?benchAvailable(f.team):[];
  let step='';
  if(f.team && !reached){
    if(!f.outId){
      step=`
      <label style="display:block;font-size:13px;color:var(--on-surface-var);margin-bottom:6px;font-weight:500;">Step 1 of 2 — who is coming off? (on pitch)</label>
      <div class="picklist">${pickRows(outList, f.outId, 'setSubOut')}</div>`;
    } else if(!f.inId){
      step=`
      ${subSwapPreview(f)}
      <label style="display:block;font-size:13px;color:var(--on-surface-var);margin:14px 0 6px;font-weight:500;">Step 2 of 2 — who is coming on? (bench)</label>
      <div class="picklist">${inList.length?pickRows(inList, f.inId, 'setSubIn'):emptyMini('No substitutes available on the bench.')}</div>`;
    } else {
      step=`${subSwapPreview(f)}${MinuteStepper()}`;
    }
  }
  return `
    <h3>Substitution</h3>
    <div class="banner info" style="margin-bottom:14px;">${I.info}<div>${rules.note}</div></div>
    ${TeamSelector('selSubTeam')}
    ${f.team?(reached?`<div class="banner err">${I.warn}<div>${team(f.team).name} has used all ${rules.maxSubs} substitutions allowed under these regulations.</div></div>`:step)
      :`<p style="color:var(--on-surface-var);font-size:13px;">Select a team to continue.</p>`}
    ${f.team&&!reached?`<div class="section-title" style="margin:10px 0 0;padding:0;">Subs used: ${state.subsUsed[f.team]}/${rules.maxSubs}</div>`:''}
    <button class="btn btn-primary" style="margin-top:14px;" ${f.team&&f.outId&&f.inId&&!reached?'':'disabled'} onclick="confirmSub()">${I.swap.replace('width="20" height="20"','width="18" height="18"')} Register substitution</button>
    <div style="height:8px"></div>
    <button class="btn btn-text" style="width:100%" onclick="closeSheet()">Cancel</button>`;
}
function setSubOut(pid){ state.form.outId=pid; state.form.inId=null; refreshSheet(subBody()); }
function setSubIn(pid){ state.form.inId=pid; refreshSheet(subBody()); }
function confirmSub(){
  const f=state.form;
  const reverted=pushEvent({type:'sub', team:f.team, outId:f.outId, inId:f.inId, minute:clampMin(f.minute)});
  closeSheet(); render();
  const pin=pById(f.inId), pout=pById(f.outId);
  snack('Substitution — '+pin.name+' on for '+pout.name+', '+clampMin(f.minute)+"'."+(reverted?' Match sheet reopened for correction — reconfirm before submitting.':''));
}

/* ---------- Shared form bits ---------- */
function TeamSelector(fn){
  const f=state.form;
  return `
  <div class="teamsel">
    <button class="${f.team==='home'?'on':''}" onclick="setFormTeam('home')">
      <div>${HOME.short}</div><div class="ts-side">Home${state.score?'':''}</div></button>
    <button class="${f.team==='away'?'on':''}" onclick="setFormTeam('away')">
      <div>${AWAY.short}</div><div class="ts-side">Away</div></button>
  </div>`;
}
function setFormTeam(key){
  const f=state.form; f.team=key; f.pid=null; f.outId=null; f.inId=null; f.scorerPid=null;
  if(f.kind==='goal') refreshSheet(goalBody());
  else if(f.kind==='card') refreshSheet(cardBody());
  else refreshSheet(subBody());
}
function MinuteStepper(){
  // Defaults to the live match clock when the form is opened (incl. during
  // half-time, when the clock itself is paused), but the REF can still
  // correct it here — e.g. an event noticed slightly late, or anything
  // logged retroactively at half-time.
  const f=state.form;
  return `
  <label style="display:block;font-size:13px;color:var(--on-surface-var);margin:12px 0 6px;font-weight:500;">Match minute</label>
  <div class="stepper">
    <button onclick="stepMinute(-1)">−</button>
    <div class="mval">${f.minute}'</div>
    <button onclick="stepMinute(1)">+</button>
  </div>`;
}
function stepMinute(d){
  const f=state.form; f.minute=Math.max(1,(f.minute||1)+d);
  if(f.kind==='goal') refreshSheet(goalBody());
  else if(f.kind==='card') refreshSheet(cardBody());
  else refreshSheet(subBody());
}
function clampMin(v){ return Math.max(1, parseInt(v,10)||1); }
function pickRows(list, sel, fn, showYellow){
  if(!list.length) return emptyMini('No eligible players.');
  return list.map(p=>{
    const yc=state.yellowCount[p.pid]||0;
    const yflag = showYellow&&yc>0?'<span class="cardico y" style="margin-left:6px;"></span>':'';
    return `
    <div class="row" onclick="${fn}('${p.pid}')">
      <div class="check radio ${sel===p.pid?'on':''}">${sel===p.pid?I.check:''}</div>
      <div class="num">${p.nr}</div>
      <div style="flex:1;"><div class="pname">${p.name}${p.captain?' <span class="badge amber" style="margin-left:4px;">C</span>':''}${yflag}</div>
        ${posSub(p)}</div>
    </div>`;
  }).join('');
}

/* ---------- Event source-of-truth mutations ---------- */
function pushEvent(ev){ ev.id=state.seq; ev.seq=state.seq++; state.events.push(ev); return reopenForCorrectionIfNeeded(); }
// The REF can keep correcting the match sheet (events, cards, subs) right up
// until it is actually submitted to the federation. A confirmed sheet is not
// a hard lock — any correction simply un-confirms it so the REF reconfirms
// before submitting (US-FS-03 extended to the whole post-match phase).
function reopenForCorrectionIfNeeded(){
  if(state.sheet.home==='CONFIRMED'){
    state.sheet.home='VALIDATED'; state.sheet.away='VALIDATED';
    return true;
  }
  return false;
}
function deleteEvent(id){   // US-MI-07 / US-FS-03
  const ev=state.events.find(e=>e.id===id);
  if(!ev) return;
  const label = ev.type==='goal'?'goal':(ev.type==='sub'?'substitution':(ev.type==='red'?'red card':'yellow card'));
  openSheet(`
    <h3>Delete ${label}?</h3>
    <p style="color:var(--on-surface-var);line-height:1.5;margin:0 0 14px;">The event is removed and the score, cards and players-on-pitch are recalculated. ${ev.type==='yellow'?'If this was a second yellow, the linked yellow/red is reversed too.':''}</p>
    <button class="btn btn-primary" onclick="doDeleteEvent(${id})">${I.trash.replace('fill="#5f6368"','fill="#fff"')} Delete event</button>
    <div style="height:8px"></div>
    <button class="btn btn-text" style="width:100%" onclick="closeSheet()">Cancel</button>`);
}
function doDeleteEvent(id){
  state.events=state.events.filter(e=>e.id!==id);
  const reverted=reopenForCorrectionIfNeeded();
  closeSheet(); render();
  snack('Event deleted.'+(reverted?' Match sheet reopened for correction — reconfirm before submitting.':''));
}

/* ---------- End of half / match (US-MI-09/10/11/12) ---------- */
function confirmEndHalf(which){
  const isMatch = which==='match';
  state.form={added:''};
  openSheet(`
    <h3>${isMatch?'End the match?':'End the first half?'}</h3>
    <p style="color:var(--on-surface-var);line-height:1.5;margin:0 0 14px;">${isMatch
      ? 'This sets the status to <b>Full time</b>, locks the final score and ends event registration. You then review and finalise the match sheet.'
      : 'This sets the status to <b>Half-time</b> and locks first-half event registration.'}</p>
    <div class="field"><label>Added time this half (optional, minutes)</label>
      <input id="addedT" type="number" min="0" max="20" inputmode="numeric" placeholder="e.g. 3" oninput="state.form.added=this.value"/></div>
    <button class="btn ${isMatch?'btn-primary':'btn-dark'}" onclick="${isMatch?'endMatch()':"endFirstHalf()"}">${isMatch?I.stop+' End match':I.flag+' End first half'}</button>
    <div style="height:8px"></div>
    <button class="btn btn-text" style="width:100%" onclick="closeSheet()">Cancel</button>`);
}
function endFirstHalf(){
  state.addedTime.first = state.form.added?parseInt(state.form.added,10):null;   // US-MI-12
  state.matchStatus='HALF_TIME';   // §1
  state.nowMin=960;                 // ~16:00 demo wall clock
  closeSheet(); render();
  snack('First half ended.'+(state.addedTime.first?' Added time: '+state.addedTime.first+" min.":''));
}
function confirmSecondHalf(){
  openSheet(`
    <h3>Start the second half?</h3>
    <p style="color:var(--on-surface-var);line-height:1.5;margin:0 0 14px;">Status returns to <b>In progress</b> and event registration is re-enabled.</p>
    <button class="btn btn-green" onclick="startSecondHalf()">${I.play} Start second half</button>
    <div style="height:8px"></div>
    <button class="btn btn-text" style="width:100%" onclick="closeSheet()">Cancel</button>`);
}
function startSecondHalf(){
  state.matchStatus='IN_PROGRESS'; state.half=2; state.liveMinute=46;
  closeSheet(); render();
  snack('Second half under way.');
}
function endMatch(){
  state.addedTime.second = state.form.added?parseInt(state.form.added,10):null;
  state.matchStatus='ENDED';   // §1 — match lifecycle ends here
  state.nowMin=1020;           // ~17:00 demo wall clock
  closeSheet(); go('post');
  snack('Match ended — final score '+state.score.home+'–'+state.score.away+'.');
}
function openLiveMenu(){
  openSheet(`
    <div class="menu-item" onclick="closeSheet();go('dashboard')">${I.back.replace('width="24" height="24"','width="22" height="22"')}<div>Back to my matches</div></div>
    <div class="menu-item" onclick="closeSheet();resetDemo()">${I.trash.replace('width="18" height="18"','width="22" height="22"')}<div>Reset demo</div></div>`);
}

/* ============================================================
   GOAL 5 — FINALIZE AND SUBMIT MATCH SHEET
   Post-match: review/correct → confirm → submit (US-FS-*)
   One screen whose content evolves with the sheet status.
   ============================================================ */
function ScPost(){
  const sheetSt=state.sheet.home; // home/away move in lockstep post-match
  const ended = sheetSt==='VALIDATED';      // ENDED, not yet confirmed
  const confirmed = sheetSt==='CONFIRMED';
  const submitted = sheetSt==='SUBMITTED';
  const canEdit = !submitted;   // corrections stay possible right up to federation submission
  const m=activeMatch();
  return `
  <div class="appbar">
    <button class="iconbtn" onclick="go('dashboard')">${I.back}</button>
    <span class="title">${submitted?'Match sheet':'Finalise match sheet'}</span>
  </div>
  <div class="scroll pad">
    <!-- Final score (US-FS-01) -->
    <div class="card"><div class="pad" style="text-align:center;">
      <div style="font-size:12px;color:var(--on-surface-var);margin-bottom:6px;">${m.competition} · ${m.round} · ${matchBadge('ENDED')}</div>
      <div class="vs" style="align-items:center;">
        <div class="team"><div class="crest" style="background:var(--rbfa-red)">${initials(HOME.name)}</div><div style="font-weight:600;font-size:13px;">${HOME.short}</div></div>
        <div class="mid"><div style="font-size:30px;color:#1f1f1f;font-weight:800;">${state.score.home} : ${state.score.away}</div><div style="font-size:11px;color:var(--on-surface-var);">Full time</div></div>
        <div class="team"><div class="crest" style="background:#5f6368">${initials(AWAY.name)}</div><div style="font-weight:600;font-size:13px;">${AWAY.short}</div></div>
      </div>
      <div style="font-size:12px;color:var(--on-surface-var);margin-top:10px;">Kick-off ${state.kickoffActual||m.kickoff}${state.addedTime.first?' · +'+state.addedTime.first+"' (1st)":''}${state.addedTime.second?' · +'+state.addedTime.second+"' (2nd)":''}</div>
    </div></div>

    ${submitted?`<div class="banner ok">${I.checkc}<div><b>Submitted to the federation.</b> ${state.submittedFedAt}. This is the official record.</div></div>`
      : confirmed?`<div class="banner ok">${I.checkc}<div><b>Match sheet confirmed.</b> Ready for submission. You can still correct it below — any change will reopen it for reconfirmation.</div></div>`
      : `<div class="banner info">${I.info}<div>Review all events and player data. Corrections remain possible until the sheet is submitted to the federation.</div></div>`}

    <!-- Events (US-FS-01); editable up to submission (US-FS-03 extended) -->
    <div class="section-title">Match events · ${state.events.length}</div>
    ${canEdit?`<div class="qa-row" style="padding:0 0 10px;">
      <button class="qa tonal" onclick="openEventPicker()">${I.plus} Add event</button>
      <button class="qa tonal" onclick="openSubForm()">${I.swap} Substitution</button>
    </div>`:''}
    <div class="card">${state.events.length?TimelineView(canEdit):emptyMini('No events were registered.')}</div>

    <!-- Line-ups & subs both teams (US-FS-01) -->
    ${PostTeamBlock('home')}
    ${PostTeamBlock('away')}

    ${canEdit?ValidationSummary():''}

    ${confirmed||submitted?RemarkBlock(submitted):''}

    ${submitted?`<div class="card"><div class="pad">
        <div class="meta">${I.clock.replace('fill="currentColor"','fill="#5f6368"')}<div><div class="mlabel">Submitted on</div><div class="mval">${state.submittedFedAt}</div></div></div>
        <div class="meta">${I.fed.replace('width="22" height="22"','width="18" height="18"').replace('fill="currentColor"','fill="#5f6368"')}<div><div class="mlabel">Status</div><div class="mval">${sheetBadge('SUBMITTED')}</div></div></div>
      </div></div>
      <button class="btn btn-outline" onclick="snack('Demo: PDF of the official match sheet generated.')">${I.download} Download PDF copy</button>
      <div style="height:8px"></div>`:''}

    ${confirmed&&!submitted?SubmitPanel():''}
    <div style="height:8px"></div>
  </div>
  ${ended?`<div class="bottom-bar">
    <button class="btn btn-green" ${ValidationOk()?'':'disabled'} onclick="confirmSheet()">${I.check.replace('fill="#fff"','fill="#fff"')} Confirm match sheet</button>
    ${ValidationOk()?'':'<div style="text-align:center;font-size:12px;color:var(--on-surface-var);margin-top:8px;">Resolve the issues above before confirming.</div>'}
  </div>`:''}
  ${submitted?`<div class="bottom-bar"><button class="btn btn-primary" onclick="go('dashboard')">Back to my matches</button></div>`:''}`;
}
function PostTeamBlock(key){
  const t=team(key);
  const starters=t.players.filter(p=>p.role==='starter').sort((a,b)=>a.nr-b.nr);
  const usedSubs=t.players.filter(p=>state.cameOn.has(p.pid)).sort((a,b)=>a.nr-b.nr);
  const line=(p)=>{
    const yc=state.yellowCount[p.pid]||0;
    const cards=(yc>0?'<span class="cardico y" style="margin-left:6px;"></span>':'')+(yc>1?'<span class="cardico yr" style="margin-left:3px;"></span>':'')+((state.sentOff.has(p.pid)&&yc<2)?'<span class="cardico r" style="margin-left:6px;"></span>':'');
    return `<div style="display:flex;gap:10px;align-items:center;padding:5px 0;font-size:14px;"><span class="num" style="width:28px;height:28px;flex:0 0 28px;font-size:12px;">${p.nr}</span>${p.name}${p.captain?' <span class="badge amber" style="margin-left:6px;">C</span>':''}${cards}</div>`;
  };
  return `
  <div class="section-title">${t.name}</div>
  <div class="card"><div class="pad">
    <div style="font-size:12px;color:var(--on-surface-var);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;">Starting XI</div>
    ${starters.map(line).join('')}
    <div style="font-size:12px;color:var(--on-surface-var);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin:10px 0 4px;">Substitutes used (${usedSubs.length})</div>
    ${usedSubs.length?usedSubs.map(line).join(''):'<div style="color:var(--on-surface-var);font-size:13px;">None.</div>'}
    <div style="font-size:12px;color:var(--on-surface-var);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin:10px 0 4px;">Officials</div>
    ${t.officials.map(o=>`<div style="font-size:13.5px;padding:3px 0;">${o.name} — <span style="color:var(--on-surface-var)">${o.role}</span>${o.delegate?' <span class="badge amber" style="margin-left:4px;">Delegate</span>':''}</div>`).join('')}
  </div></div>`;
}
function ValidationChecksPost(){   // US-FS-04 — internal consistency
  const goals=state.events.filter(e=>e.type==='goal');
  return [
    {label:'Final score recorded ('+state.score.home+'–'+state.score.away+')', ok:true},
    {label:'Every goal has a scorer assigned', ok:goals.every(g=>!!g.scorerPid)},
    {label:'Every card is attributed to a player', ok:state.events.filter(e=>e.type==='yellow'||e.type==='red').every(c=>!!c.pid)},
    {label:'No team exceeded '+subRules().maxSubs+' substitutions', ok:state.subsUsed.home<=subRules().maxSubs && state.subsUsed.away<=subRules().maxSubs},
  ];
}
function ValidationOk(){ return ValidationChecksPost().every(c=>c.ok); }
function ValidationSummary(){
  const checks=ValidationChecksPost();
  return `
  <div class="section-title">Pre-confirmation checks</div>
  <div class="card"><div class="pad">
    ${checks.map(c=>`<div class="req ${c.ok?'met':'fail'}">${c.ok?I.check.replace('fill="#fff"','fill="#1e8e3e"'):I.warn.replace('width="20" height="20"','width="16" height="16"')}<div>${c.label}</div></div>`).join('')}
  </div></div>`;
}
function RemarkBlock(readonly){   // US-FS-05
  return `
  <div class="section-title">Match remark (optional)</div>
  <div class="card"><div class="pad">
    ${readonly
      ? `<div style="font-size:14px;color:${state.remark?'var(--on-surface)':'var(--on-surface-var)'};">${state.remark||'No remark added.'}</div>`
      : `<div class="field" style="margin:0;"><textarea id="remarkTxt" placeholder="Document any incident or exceptional circumstance for the federation..." oninput="state.remark=this.value">${state.remark}</textarea></div>`}
  </div></div>`;
}
function confirmSheet(){   // US-FS-02
  openSheet(`
    <h3>Confirm match sheet?</h3>
    <p style="color:var(--on-surface-var);line-height:1.5;margin:0 0 14px;">All recorded data — events, score and squads — is marked as reviewed and ready for submission to the federation. You can still make corrections afterwards; doing so will reopen the sheet and ask you to reconfirm.</p>
    <button class="btn btn-green" onclick="doConfirmSheet()">${I.check.replace('fill="#fff"','fill="#fff"')} Confirm match sheet</button>
    <div style="height:8px"></div>
    <button class="btn btn-text" style="width:100%" onclick="closeSheet()">Cancel</button>`);
}
function doConfirmSheet(){
  state.sheet.home='CONFIRMED'; state.sheet.away='CONFIRMED';   // §2
  state.nowMin=1025;
  closeSheet(); render();
  snack('Match sheet confirmed — ready for submission.');
}
function SubmitPanel(){   // US-FS-06/07
  const deadline=submissionDeadline();
  return `
  <div class="section-title">Submit to federation</div>
  <div class="card"><div class="pad">
    <div class="meta">${I.cal}<div><div class="mlabel">Submission deadline</div><div class="mval">${deadline} · 23:59</div></div></div>
    <div class="meta">${I.fed.replace('width="22" height="22"','width="16" height="16"').replace('fill="currentColor"','fill="#5f6368"')}<div><div class="mlabel">Channel</div><div class="mval">RBFA digital platform</div></div></div>
  </div></div>
  <button class="btn btn-primary" onclick="submitToFederation()">${I.fed} Submit confirmed match sheet</button>`;
}
function submissionDeadline(){   // next working day after the match (assumption #7)
  const d=new Date(activeMatch().date+'T00:00:00');
  d.setDate(d.getDate()+1);
  while(d.getDay()===0||d.getDay()===6) d.setDate(d.getDate()+1);
  return d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}
function submitToFederation(){   // US-FS-06
  state.sheet.home='SUBMITTED'; state.sheet.away='SUBMITTED';
  state.nowMin=1030;
  state.submittedFedAt = activeMatch().dateLabel+', '+fmtTime(state.nowMin);   // US-FS-08 timestamp
  render();
  snack('Submitted to the federation at '+fmtTime(state.nowMin)+'.');
}

/* boot */
render();
</script>
</body>
</html>
